<svg xmlns="http://www.w3.org/2000/svg" width="390" height="980" viewBox="0 0 390 980" role="img" aria-label="Схематичный mobile-макет карточки товара">
  <rect x="0" y="0" width="390" height="980" fill="#ffffff"/>
  <text x="20" y="32" font-family="Arial" font-size="16">Карточка товара mobile</text>
  <rect x="16" y="52" width="358" height="52" fill="none" stroke="#222"/>
