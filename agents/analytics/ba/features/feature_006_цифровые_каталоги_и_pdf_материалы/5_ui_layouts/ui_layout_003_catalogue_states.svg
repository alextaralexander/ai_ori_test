<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-label="Схематичный макет состояний цифрового каталога">
  <rect x="0" y="0" width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="40" font-family="Arial" font-size="20">Состояния цифрового каталога</text>
  <rect x="40" y="80" width="520" height="185" fill="none" stroke="#222"/>
  <text x="60" y="112" font-family="Arial" font-size="16">Опубликованный текущий каталог</text>
  <rect x="60" y="135" width="190" height="28" fill="none" stroke="#777"/>
  <text x="72" y="155" font-family="Arial" font-size="12">Период и статус</text>
  <rect x="60" y="180" width="220" height="52" fill="none" stroke="#777"/>
  <text x="78" y="212" font-family="Arial" font-size="12">Открыть PDF viewer</text>
  <rect x="310" y="180" width="210" height="52" fill="none" stroke="#777"/>
  <text x="330" y="212" font-family="Arial" font-size="12">Перейти к товару</text>
  <rect x="620" y="80" width="520" height="185" fill="none" stroke="#222"/>
  <text x="640" y="112" font-family="Arial" font-size="16">Следующий каталог закрыт для роли</text>
  <rect x="640" y="145" width="460" height="44" fill="none" stroke="#777"/>
  <text x="660" y="173" font-family="Arial" font-size="12">Локализованное состояние недоступности</text>
  <rect x="640" y="205" width="220" height="38" fill="none" stroke="#777"/>
  <text x="662" y="230" font-family="Arial" font-size="12">Вернуться к текущему</text>
  <rect x="40" y="305" width="520" height="185" fill="none" stroke="#222"/>
  <text x="60" y="337" font-family="Arial" font-size="16">PDF временно недоступен</text>
  <rect x="60" y="370" width="460" height="44" fill="none" stroke="#777"/>
  <text x="82" y="398" font-family="Arial" font-size="12">Локализованная ошибка загрузки материала</text>
  <rect x="60" y="430" width="180" height="38" fill="none" stroke="#777"/>
  <text x="88" y="455" font-family="Arial" font-size="12">Повторить</text>
  <rect x="260" y="430" width="180" height="38" fill="none" stroke="#777"/>
  <text x="290" y="455" font-family="Arial" font-size="12">Другой материал</text>
  <rect x="620" y="305" width="520" height="185" fill="none" stroke="#222"/>
  <text x="640" y="337" font-family="Arial" font-size="16">Нет опубликованного выпуска</text>
  <rect x="640" y="370" width="460" height="44" fill="none" stroke="#777"/>
  <text x="668" y="398" font-family="Arial" font-size="12">Пустое состояние без технических деталей</text>
  <rect x="640" y="430" width="220" height="38" fill="none" stroke="#777"/>
  <text x="666" y="455" font-family="Arial" font-size="12">Открыть каталог товаров</text>
  <rect x="40" y="530" width="1100" height="170" fill="none" stroke="#222"/>
  <text x="60" y="562" font-family="Arial" font-size="16">Общие требования к состояниям</text>
  <text x="60" y="598" font-family="Arial" font-size="13">Все пользовательские тексты приходят из i18n dictionaries.</text>
  <text x="60" y="626" font-family="Arial" font-size="13">Backend передает данные и STR_MNEMO_* коды для контролируемых сообщений.</text>
  <text x="60" y="654" font-family="Arial" font-size="13">Viewer не раскрывает приватные PDF и не показывает raw JSON, stack trace или служебные признаки.</text>
</svg>
