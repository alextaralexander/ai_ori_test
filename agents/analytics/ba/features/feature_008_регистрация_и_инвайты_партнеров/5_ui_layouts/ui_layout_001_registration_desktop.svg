<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-label="Схематичный desktop-макет регистрации партнера">
  <rect x="0" y="0" width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial" font-size="22">Регистрация партнера: desktop</text>
  <rect x="40" y="70" width="1100" height="54" fill="none" stroke="#222"/>
  <text x="62" y="102" font-family="Arial" font-size="14">Шапка: логотип, навигация, выбор языка, вход</text>
  <rect x="40" y="150" width="300" height="560" fill="none" stroke="#222"/>
  <text x="62" y="182" font-family="Arial" font-size="16">Контекст приглашения</text>
  <rect x="62" y="210" width="250" height="58" fill="none" stroke="#777"/>
  <text x="78" y="244" font-family="Arial" font-size="13">Спонсор и статус кода</text>
  <rect x="62" y="292" width="250" height="58" fill="none" stroke="#777"/>
  <text x="78" y="326" font-family="Arial" font-size="13">Campaign и landing source</text>
  <rect x="62" y="374" width="250" height="58" fill="none" stroke="#777"/>
  <text x="78" y="408" font-family="Arial" font-size="13">Beauty / business сценарий</text>
  <rect x="62" y="470" width="250" height="110" fill="none" stroke="#777"/>
  <text x="78" y="504" font-family="Arial" font-size="13">Контролируемые состояния</text>
  <text x="78" y="532" font-family="Arial" font-size="12">Неверный, истекший,</text>
  <text x="78" y="554" font-family="Arial" font-size="12">отключенный invite-код</text>
  <rect x="380" y="150" width="500" height="560" fill="none" stroke="#222"/>
  <text x="410" y="182" font-family="Arial" font-size="16">Пошаговая форма</text>
  <rect x="410" y="210" width="430" height="38" fill="none" stroke="#444"/>
  <text x="430" y="235" font-family="Arial" font-size="12">Stepper: данные → контакты → согласия → проверка</text>
  <text x="410" y="282" font-family="Arial" font-size="13">Имя и фамилия</text>
  <rect x="410" y="296" width="430" height="34" fill="none" stroke="#777"/>
  <text x="410" y="362" font-family="Arial" font-size="13">Email или телефон</text>
  <rect x="410" y="376" width="430" height="34" fill="none" stroke="#777"/>
  <text x="410" y="442" font-family="Arial" font-size="13">Invite-код</text>
  <rect x="410" y="456" width="300" height="34" fill="none" stroke="#777"/>
  <rect x="724" y="456" width="116" height="34" fill="none" stroke="#777"/>
  <text x="744" y="478" font-family="Arial" font-size="12">Проверить</text>
  <rect x="410" y="526" width="430" height="74" fill="none" stroke="#777"/>
  <text x="430" y="552" font-family="Arial" font-size="12">Чекбоксы согласий и ссылки на условия</text>
  <text x="430" y="576" font-family="Arial" font-size="12">Версии документов сохраняются с заявкой</text>
  <rect x="410" y="632" width="205" height="44" fill="none" stroke="#777"/>
  <text x="454" y="660" font-family="Arial" font-size="13">Назад</text>
  <rect x="635" y="632" width="205" height="44" fill="none" stroke="#222"/>
  <text x="690" y="660" font-family="Arial" font-size="13">Отправить заявку</text>
  <rect x="920" y="150" width="220" height="560" fill="none" stroke="#222"/>
  <text x="940" y="182" font-family="Arial" font-size="16">Помощь и privacy</text>
  <rect x="940" y="220" width="178" height="70" fill="none" stroke="#777"/>
  <text x="956" y="250" font-family="Arial" font-size="12">Что будет после</text>
  <text x="956" y="272" font-family="Arial" font-size="12">отправки заявки</text>
  <rect x="940" y="320" width="178" height="70" fill="none" stroke="#777"/>
  <text x="956" y="350" font-family="Arial" font-size="12">Безопасность</text>
  <text x="956" y="372" font-family="Arial" font-size="12">персональных данных</text>
  <rect x="940" y="420" width="178" height="70" fill="none" stroke="#777"/>
  <text x="956" y="450" font-family="Arial" font-size="12">Связь со спонсором</text>
  <text x="956" y="472" font-family="Arial" font-size="12">если доступна</text>
</svg>
