<svg xmlns="http://www.w3.org/2000/svg" width="390" height="980" viewBox="0 0 390 980" role="img" aria-label="Схематичный mobile-макет активации партнера">
  <rect x="0" y="0" width="390" height="980" fill="#ffffff"/>
  <text x="16" y="34" font-family="Arial" font-size="18">Активация партнера: mobile</text>
  <rect x="16" y="56" width="358" height="48" fill="none" stroke="#222"/>
  <text x="30" y="86" font-family="Arial" font-size="12">Шапка: назад, логотип, язык</text>
  <rect x="16" y="124" width="358" height="96" fill="none" stroke="#222"/>
  <text x="30" y="154" font-family="Arial" font-size="14">Статус приглашения</text>
  <text x="30" y="182" font-family="Arial" font-size="12">Спонсор, campaign, тип регистрации</text>
  <text x="30" y="204" font-family="Arial" font-size="12">Без закрытых персональных данных</text>
  <rect x="16" y="244" width="358" height="74" fill="none" stroke="#777"/>
  <text x="30" y="274" font-family="Arial" font-size="13">Шаг 1: подтверждение email/телефона</text>
  <text x="30" y="296" font-family="Arial" font-size="12">Поле одноразового кода и resend</text>
  <rect x="16" y="342" width="358" height="110" fill="none" stroke="#777"/>
  <text x="30" y="372" font-family="Arial" font-size="13">Шаг 2: партнерские условия</text>
  <rect x="30" y="392" width="18" height="18" fill="none" stroke="#777"/>
  <text x="58" y="407" font-family="Arial" font-size="12">Правила участия</text>
  <rect x="30" y="422" width="18" height="18" fill="none" stroke="#777"/>
  <text x="58" y="437" font-family="Arial" font-size="12">Обработка персональных данных</text>
  <rect x="16" y="476" width="358" height="82" fill="none" stroke="#777"/>
  <text x="30" y="506" font-family="Arial" font-size="13">Шаг 3: создание способа входа</text>
  <text x="30" y="528" font-family="Arial" font-size="12">Пароль или текущий безопасный метод</text>
  <rect x="16" y="582" width="358" height="116" fill="none" stroke="#222"/>
  <text x="30" y="612" font-family="Arial" font-size="14">Результат активации</text>
  <text x="30" y="640" font-family="Arial" font-size="12">Начальный партнерский статус</text>
  <text x="30" y="662" font-family="Arial" font-size="12">Personal referral code и link</text>
  <rect x="30" y="674" width="160" height="18" fill="none" stroke="#777"/>
  <rect x="16" y="724" width="358" height="52" fill="none" stroke="#222"/>
  <text x="96" y="756" font-family="Arial" font-size="13">Активировать партнера</text>
  <rect x="16" y="804" width="358" height="86" fill="none" stroke="#777"/>
  <text x="30" y="834" font-family="Arial" font-size="13">Ошибки token/code</text>
  <text x="30" y="858" font-family="Arial" font-size="12">Истекший, неверный, уже использован</text>
  <text x="30" y="880" font-family="Arial" font-size="12">Локализованное восстановление</text>
  <rect x="16" y="916" width="358" height="44" fill="none" stroke="#777"/>
  <text x="56" y="944" font-family="Arial" font-size="12">Доступные действия после активации</text>
</svg>
