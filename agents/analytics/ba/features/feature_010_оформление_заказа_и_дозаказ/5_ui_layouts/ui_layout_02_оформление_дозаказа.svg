<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Feature 010 - оформление дозаказа</title>
  <desc id="desc">Схематичный макет страницы /order/supplementary: партнерский checkout, условия дозаказа, partner context и отдельные итоги.</desc>
  <rect x="20" y="20" width="1160" height="860" fill="white" stroke="black"/>
  <text x="48" y="60" font-size="24">/order/supplementary - Оформление дозаказа партнера</text>

  <rect x="48" y="92" width="1104" height="64" fill="white" stroke="black"/>
  <text x="72" y="130" font-size="18">Шаги: 1 Partner context -> 2 Получатель -> 3 Доставка -> 4 Оплата -> 5 Подтверждение</text>

  <rect x="48" y="184" width="330" height="600" fill="white" stroke="black"/>
  <text x="72" y="222" font-size="20">Условия дозаказа</text>
  <rect x="72" y="250" width="282" height="72" fill="white" stroke="black"/>
  <text x="92" y="282" font-size="15">Partner status</text>
  <text x="92" y="306" font-size="13">sponsor/referral context</text>
  <rect x="72" y="348" width="282" height="72" fill="white" stroke="black"/>
  <text x="92" y="380" font-size="15">VIP / super order mode</text>
  <text x="92" y="404" font-size="13">доступность и причины блокировки</text>
  <rect x="72" y="446" width="282" height="98" fill="white" stroke="black"/>
  <text x="92" y="478" font-size="15">Benefit limits</text>
  <text x="92" y="502" font-size="13">retention, subscriptions, catalog rules</text>
  <rect x="72" y="570" width="282" height="96" fill="white" stroke="black"/>
  <text x="92" y="604" font-size="15">Validation reasons</text>
  <text x="92" y="628" font-size="13">STR_MNEMO_* mapping</text>

  <rect x="406" y="184" width="408" height="600" fill="white" stroke="black"/>
  <text x="430" y="222" font-size="20">Форма checkout</text>
  <rect x="430" y="250" width="360" height="54" fill="white" stroke="black"/>
  <text x="450" y="284" font-size="15">Получатель и контакты</text>
  <rect x="430" y="324" width="360" height="54" fill="white" stroke="black"/>
  <text x="450" y="358" font-size="15">Адрес / пункт выдачи</text>
  <rect x="430" y="398" width="360" height="74" fill="white" stroke="black"/>
  <text x="450" y="432" font-size="15">Доставка для supplementary order</text>
  <text x="450" y="454" font-size="13">не использует основной checkout</text>
  <rect x="430" y="492" width="360" height="74" fill="white" stroke="black"/>
  <text x="450" y="526" font-size="15">Оплата и кошелек</text>
  <text x="450" y="548" font-size="13">лимиты дозаказа проверяются backend</text>
  <rect x="430" y="586" width="360" height="98" fill="white" stroke="black"/>
  <text x="450" y="620" font-size="15">Подтверждение</text>
  <text x="450" y="644" font-size="13">idempotency key, reserve, order number</text>

  <rect x="842" y="184" width="310" height="600" fill="white" stroke="black"/>
  <text x="866" y="222" font-size="20">Итоги дозаказа</text>
  <rect x="866" y="250" width="262" height="128" fill="white" stroke="black"/>
  <text x="886" y="282" font-size="15">Supplementary cart lines</text>
  <text x="886" y="306" font-size="13">только type SUPPLEMENTARY</text>
  <text x="886" y="330" font-size="13">основная корзина не меняется</text>
  <rect x="866" y="406" width="262" height="118" fill="white" stroke="black"/>
  <text x="886" y="438" font-size="15">Предварительные выгоды</text>
  <text x="886" y="462" font-size="13">partner benefits preview</text>
  <text x="886" y="486" font-size="13">без финального начисления</text>
  <rect x="866" y="552" width="262" height="84" fill="white" stroke="black"/>
  <text x="886" y="586" font-size="15">Grand total дозаказа</text>
  <text x="886" y="610" font-size="13">delivery, wallet, payable amount</text>
  <rect x="866" y="670" width="120" height="54" fill="white" stroke="black"/>
  <text x="894" y="704" font-size="15">Назад</text>
  <rect x="1008" y="670" width="120" height="54" fill="white" stroke="black"/>
  <text x="1030" y="704" font-size="15">Подтвердить</text>

  <rect x="48" y="814" width="1104" height="42" fill="white" stroke="black"/>
  <text x="72" y="842" font-size="14">Mobile: условия дозаказа, форма и итоги идут одной колонкой; блокировка дозаказа заменяет форму контролируемым состоянием.</text>
</svg>
