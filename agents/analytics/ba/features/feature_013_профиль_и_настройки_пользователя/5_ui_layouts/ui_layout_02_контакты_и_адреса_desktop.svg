<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Макет контактов и адресов desktop</title>
  <desc id="desc">Схематичный макет разделов /profile-settings/contacts и /profile-settings/addresses.</desc>
  <rect width="1200" height="820" fill="#ffffff"/>
  <rect x="40" y="32" width="1120" height="72" fill="#f3f5f7" stroke="#9aa4af"/>
