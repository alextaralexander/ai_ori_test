  <rect x="648" y="324" width="488" height="256" fill="#ffffff" stroke="#667085"/>
  <text x="668" y="358" font-family="Arial" font-size="15">Форма адреса</text>
  <rect x="668" y="384" width="204" height="40" fill="#f8fafc" stroke="#667085"/>
  <text x="686" y="410" font-family="Arial" font-size="13">Город</text>
