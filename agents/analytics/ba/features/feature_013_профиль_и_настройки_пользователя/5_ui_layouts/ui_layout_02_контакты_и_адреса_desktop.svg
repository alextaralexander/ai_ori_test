  <rect x="320" y="382" width="208" height="44" fill="#ffffff" stroke="#667085"/>
  <text x="338" y="410" font-family="Arial" font-size="13">Значение</text>
  <rect x="84" y="446" width="168" height="40" fill="#dbeafe" stroke="#2563eb"/>
  <text x="112" y="472" font-family="Arial" font-size="14">Сохранить</text>
