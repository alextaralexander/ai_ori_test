  <text x="84" y="232" font-family="Arial" font-size="15">Основной email</text>
  <text x="84" y="260" font-family="Arial" font-size="13">masked value, status</text>
  <rect x="320" y="198" width="232" height="92" fill="#f8fafc" stroke="#667085"/>
