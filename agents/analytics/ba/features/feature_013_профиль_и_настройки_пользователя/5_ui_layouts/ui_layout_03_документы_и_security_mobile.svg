<svg xmlns="http://www.w3.org/2000/svg" width="390" height="920" viewBox="0 0 390 920" role="img" aria-labelledby="title desc">
  <title id="title">Макет документов и безопасности mobile</title>
  <desc id="desc">Схематичный мобильный макет разделов /profile-settings/documents и /profile-settings/security.</desc>
  <rect width="390" height="920" fill="#ffffff"/>
  <rect x="16" y="20" width="358" height="56" fill="#f3f5f7" stroke="#9aa4af"/>
  <text x="32" y="54" font-family="Arial" font-size="18">Профиль</text>
  <rect x="16" y="96" width="358" height="48" fill="#f8fafc" stroke="#667085"/>
  <text x="32" y="126" font-family="Arial" font-size="14">Секции: Документы / Безопасность</text>
  <rect x="16" y="168" width="358" height="248" fill="#ffffff" stroke="#9aa4af"/>
  <text x="32" y="200" font-family="Arial" font-size="16">Документы</text>
  <rect x="32" y="224" width="326" height="72" fill="#f8fafc" stroke="#667085"/>
  <text x="48" y="256" font-family="Arial" font-size="14">Активный документ</text>
  <text x="48" y="280" font-family="Arial" font-size="12">masked number, статус</text>
  <rect x="32" y="316" width="326" height="44" fill="#ffffff" stroke="#667085"/>
  <text x="48" y="344" font-family="Arial" font-size="13">Тип документа и данные</text>
  <rect x="32" y="376" width="154" height="32" fill="#dbeafe" stroke="#2563eb"/>
  <text x="58" y="398" font-family="Arial" font-size="13">Сохранить</text>
  <rect x="204" y="376" width="154" height="32" fill="#ffffff" stroke="#667085"/>
  <text x="236" y="398" font-family="Arial" font-size="13">История</text>
  <rect x="16" y="440" width="358" height="332" fill="#f8fafc" stroke="#9aa4af"/>
  <text x="32" y="472" font-family="Arial" font-size="16">Безопасность</text>
  <rect x="32" y="496" width="326" height="48" fill="#ffffff" stroke="#667085"/>
  <text x="48" y="526" font-family="Arial" font-size="13">Текущий пароль / challenge</text>
  <rect x="32" y="560" width="326" height="48" fill="#ffffff" stroke="#667085"/>
  <text x="48" y="590" font-family="Arial" font-size="13">Новый пароль</text>
  <rect x="32" y="624" width="326" height="48" fill="#ffffff" stroke="#667085"/>
  <text x="48" y="654" font-family="Arial" font-size="13">Повтор нового пароля</text>
  <rect x="32" y="692" width="326" height="40" fill="#dbeafe" stroke="#2563eb"/>
  <text x="124" y="718" font-family="Arial" font-size="14">Сменить пароль</text>
  <rect x="16" y="796" width="358" height="88" fill="#ffffff" stroke="#9aa4af"/>
  <text x="32" y="830" font-family="Arial" font-size="15">Последние события</text>
  <text x="32" y="858" font-family="Arial" font-size="12">audit trail, masked values, occurredAt</text>
</svg>
