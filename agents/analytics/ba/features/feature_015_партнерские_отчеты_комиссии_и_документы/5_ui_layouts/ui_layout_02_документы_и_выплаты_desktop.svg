<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Feature 015 desktop documents and payouts</title>
  <desc id="desc">Схематичный макет страницы документов, квитанций, актов и выплат партнера</desc>
  <rect x="0" y="0" width="1280" height="860" fill="white"/>
  <rect x="48" y="40" width="1184" height="72" fill="none" stroke="#111"/>
  <text x="72" y="84" font-family="Arial" font-size="20">Шапка: каталог, заказы, отчеты, бонусы, профиль, язык, выход</text>
  <text x="48" y="154" font-family="Arial" font-size="28">Документы по выплатам</text>
  <rect x="48" y="190" width="1184" height="84" fill="none" stroke="#111"/>
  <text x="72" y="222" font-family="Arial" font-size="15">Фильтры: period, document type, status, payout, catalog, bonus program</text>
  <rect x="72" y="238" width="130" height="24" fill="none" stroke="#777"/>
  <rect x="222" y="238" width="150" height="24" fill="none" stroke="#777"/>
  <rect x="392" y="238" width="150" height="24" fill="none" stroke="#777"/>
  <rect x="562" y="238" width="150" height="24" fill="none" stroke="#777"/>
  <rect x="732" y="238" width="150" height="24" fill="none" stroke="#777"/>
  <rect x="1032" y="230" width="176" height="34" fill="none" stroke="#111"/>
  <text x="1064" y="252" font-family="Arial" font-size="14">Экспорт реестра</text>
  <rect x="48" y="306" width="746" height="412" fill="none" stroke="#111"/>
  <text x="72" y="342" font-family="Arial" font-size="16">Список документов</text>
  <line x1="72" y1="370" x2="770" y2="370" stroke="#777"/>
  <text x="72" y="400" font-family="Arial" font-size="14">Тип | Период | Версия | Статус | Checksum | Published</text>
  <line x1="72" y1="420" x2="770" y2="420" stroke="#ddd"/>
  <text x="72" y="454" font-family="Arial" font-size="14">ACT | 2026-05 | v3 | PUBLISHED | sha256:...</text>
  <text x="72" y="502" font-family="Arial" font-size="14">RECEIPT | 2026-05 | v1 | PUBLISHED | sha256:...</text>
  <text x="72" y="550" font-family="Arial" font-size="14">PAYOUT_STATEMENT | 2026-05 | v2 | READY | sha256:...</text>
  <text x="72" y="598" font-family="Arial" font-size="14">RECONCILIATION_REPORT | 2026-05 | v1 | REVOKED | sha256:...</text>
  <rect x="826" y="306" width="406" height="412" fill="none" stroke="#111"/>
  <text x="850" y="342" font-family="Arial" font-size="16">Детали документа</text>
  <text x="850" y="386" font-family="Arial" font-size="14">document id, type, period</text>
  <text x="850" y="422" font-family="Arial" font-size="14">version, checksum, author, reason</text>
  <text x="850" y="458" font-family="Arial" font-size="14">linked payout and commissions</text>
  <text x="850" y="494" font-family="Arial" font-size="14">audit metadata and correlation id</text>
  <rect x="850" y="548" width="130" height="34" fill="none" stroke="#111"/>
  <text x="882" y="570" font-family="Arial" font-size="14">Скачать</text>
  <rect x="1000" y="548" width="130" height="34" fill="none" stroke="#111"/>
  <text x="1026" y="570" font-family="Arial" font-size="14">Печать</text>
  <rect x="850" y="606" width="130" height="34" fill="none" stroke="#111"/>
  <text x="878" y="628" font-family="Arial" font-size="14">Отозвать</text>
  <rect x="48" y="750" width="1184" height="48" fill="none" stroke="#111"/>
  <text x="72" y="780" font-family="Arial" font-size="14">Access states: partner own documents, accountant publish, finance controller revoke</text>
