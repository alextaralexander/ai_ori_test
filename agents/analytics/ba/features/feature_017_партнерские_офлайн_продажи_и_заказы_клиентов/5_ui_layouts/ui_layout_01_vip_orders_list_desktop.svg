<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Feature 017: список VIP-заказов партнера</title>
  <desc id="desc">Схематичный desktop layout без стилей для списка клиентских офлайн-заказов.</desc>
  <rect x="24" y="24" width="1152" height="712" fill="white" stroke="#222"/>
