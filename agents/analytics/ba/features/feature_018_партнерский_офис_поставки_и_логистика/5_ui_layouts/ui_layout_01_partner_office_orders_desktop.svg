  <rect x="72" y="466" width="1136" height="58" fill="none" stroke="#777"/>
  <rect x="72" y="540" width="1136" height="58" fill="none" stroke="#777"/>
  <rect x="72" y="614" width="1136" height="58" fill="none" stroke="#777"/>
  <rect x="48" y="716" width="360" height="48" fill="none" stroke="#555"/>
  <text x="72" y="746" font-family="Arial" font-size="16">Пагинация и загрузка следующей страницы</text>
</svg>
