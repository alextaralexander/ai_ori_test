  <text x="40" y="438" font-family="Arial" font-size="14">status, supplyId, delivery, deviation</text>
  <rect x="24" y="520" width="342" height="120" fill="none" stroke="#777"/>
  <text x="40" y="552" font-family="Arial" font-size="14">Карточка supply BOG-SUP-018-001</text>
