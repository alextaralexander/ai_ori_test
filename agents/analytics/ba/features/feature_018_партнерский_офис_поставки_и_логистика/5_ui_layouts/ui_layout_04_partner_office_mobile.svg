  <rect x="24" y="660" width="342" height="144" fill="none" stroke="#555"/>
  <text x="40" y="692" font-family="Arial" font-size="14">Timeline и складские движения</text>
  <rect x="24" y="824" width="342" height="104" fill="none" stroke="#555"/>
  <text x="40" y="856" font-family="Arial" font-size="14">Actions: приемка, отклонение, переходы</text>
