<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="940" viewBox="0 0 1280 940" role="img" aria-labelledby="title desc">
  <title id="title">Feature 020: детали заказа сотрудника</title>
  <desc id="desc">Схематичный макет маршрута /employee/order-history/:orderId с сервисными данными заказа</desc>
  <rect x="24" y="24" width="1232" height="892" fill="white" stroke="black"/>
  <text x="48" y="64" font-family="Arial" font-size="24">/employee/order-history/:orderId - Детали заказа сотрудника</text>

  <rect x="48" y="92" width="1184" height="86" fill="none" stroke="black"/>
  <text x="64" y="122" font-family="Arial" font-size="16">Сводка: BOG-ORD-020-001 / кампания / сумма / orderStatus / paymentStatus / deliveryStatus / fulfillmentStatus</text>
  <text x="64" y="154" font-family="Arial" font-size="14">Deep links: support / claim / payment events / partner card / delivery tracking</text>

  <rect x="48" y="206" width="360" height="156" fill="none" stroke="black"/>
  <text x="64" y="236" font-family="Arial" font-size="16">Клиент и партнер</text>
  <text x="64" y="268" font-family="Arial" font-size="13">customerId, masked contact, segment</text>
  <text x="64" y="294" font-family="Arial" font-size="13">partnerId, rank, office, region</text>
  <text x="64" y="320" font-family="Arial" font-size="13">supportReasonCode / sourceChannel</text>

  <rect x="432" y="206" width="380" height="156" fill="none" stroke="black"/>
  <text x="448" y="236" font-family="Arial" font-size="16">Оплата и бонусы</text>
  <text x="448" y="268" font-family="Arial" font-size="13">paymentEventIds, status, provider</text>
  <text x="448" y="294" font-family="Arial" font-size="13">bonus points, promo, manual adjustment</text>
  <text x="448" y="320" font-family="Arial" font-size="13">supervisorRequired</text>

  <rect x="836" y="206" width="396" height="156" fill="none" stroke="black"/>
  <text x="852" y="236" font-family="Arial" font-size="16">Доставка и сборка</text>
  <text x="852" y="268" font-family="Arial" font-size="13">deliveryTrackingId, point/courier</text>
  <text x="852" y="294" font-family="Arial" font-size="13">wmsBatchId, WMS events, conveyor status</text>
  <text x="852" y="320" font-family="Arial" font-size="13">problem flags and SLA</text>

  <rect x="48" y="390" width="580" height="198" fill="none" stroke="black"/>
  <text x="64" y="420" font-family="Arial" font-size="16">Состав заказа и totals</text>
  <line x1="48" y1="446" x2="628" y2="446" stroke="black"/>
  <text x="64" y="470" font-family="Arial" font-size="13">SKU / название / qty / price / promo / bonus / reserve</text>
  <text x="64" y="506" font-family="Arial" font-size="13">SKU-020-CREAM-001 / Крем / 2 / 3490 / C06 / 120 PV</text>
  <text x="64" y="542" font-family="Arial" font-size="13">Итого: goods, delivery, discount, bonus, payable</text>

  <rect x="652" y="390" width="580" height="198" fill="none" stroke="black"/>
  <text x="668" y="420" font-family="Arial" font-size="16">Связанные объекты</text>
  <text x="668" y="456" font-family="Arial" font-size="13">Support cases: открытый кейс employee-support</text>
  <text x="668" y="492" font-family="Arial" font-size="13">Claims: CLAIM-020-001 status OPEN</text>
  <text x="668" y="528" font-family="Arial" font-size="13">Payment events: AUTHORIZED / CAPTURED / RETRY</text>
  <text x="668" y="564" font-family="Arial" font-size="13">WMS events: PICK_DELAYED / BATCH_HOLD</text>

  <rect x="48" y="616" width="760" height="236" fill="none" stroke="black"/>
  <text x="64" y="646" font-family="Arial" font-size="16">Audit trail</text>
  <line x1="48" y1="672" x2="808" y2="672" stroke="black"/>
  <text x="64" y="700" font-family="Arial" font-size="13">occurredAt / actorUserId / actorRole / actionType / sourceRoute / reason</text>
  <text x="64" y="736" font-family="Arial" font-size="13">ORDER_HISTORY_LIST_VIEWED / ORDER_DETAILS_VIEWED / DEEP_LINK_OPENED</text>
  <text x="64" y="772" font-family="Arial" font-size="13">Supervisor mode: расширенные события и сотрудник-владелец действия</text>

  <rect x="836" y="616" width="396" height="236" fill="none" stroke="black"/>
  <text x="852" y="646" font-family="Arial" font-size="16">Действия и ошибки</text>
  <text x="852" y="686" font-family="Arial" font-size="13">Доступные действия как codes</text>
  <text x="852" y="724" font-family="Arial" font-size="13">STR_MNEMO_EMPLOYEE_ORDER_NOT_FOUND</text>
  <text x="852" y="762" font-family="Arial" font-size="13">STR_MNEMO_EMPLOYEE_ACCESS_DENIED</text>
  <text x="852" y="800" font-family="Arial" font-size="13">STR_MNEMO_EMPLOYEE_AUDIT_RECORDED</text>
</svg>