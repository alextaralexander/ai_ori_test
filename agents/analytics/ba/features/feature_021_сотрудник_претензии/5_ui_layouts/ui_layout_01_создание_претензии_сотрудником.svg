<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>Feature 021. Создание претензии сотрудником</title>
  <desc>Схематичный wireframe маршрута /employee/submit-claim без визуальных стилей.</desc>
  <rect x="20" y="20" width="1160" height="720" fill="white" stroke="black"/>
  <text x="48" y="60" font-family="Arial" font-size="24">/employee/submit-claim — создание претензии сотрудником</text>
  <rect x="48" y="90" width="1104" height="68" fill="none" stroke="black"/>
  <text x="70" y="130" font-family="Arial" font-size="18">Поиск клиента / партнера / заказа, основание обращения, источник канала</text>
  <rect x="48" y="184" width="360" height="500" fill="none" stroke="black"/>
  <text x="70" y="220" font-family="Arial" font-size="18">Контекст заказа</text>
  <text x="70" y="260" font-family="Arial" font-size="15">Клиент или партнер</text>
  <text x="70" y="292" font-family="Arial" font-size="15">Заказ, кампания, оплата</text>
  <text x="70" y="324" font-family="Arial" font-size="15">Доставка и сборка</text>
  <text x="70" y="356" font-family="Arial" font-size="15">Предыдущие претензии</text>
  <rect x="432" y="184" width="424" height="500" fill="none" stroke="black"/>
  <text x="454" y="220" font-family="Arial" font-size="18">Позиции и проблема</text>
  <rect x="454" y="246" width="380" height="64" fill="none" stroke="black"/>
  <text x="470" y="284" font-family="Arial" font-size="15">Таблица позиций заказа с quantity и claimAvailable</text>
  <rect x="454" y="330" width="380" height="64" fill="none" stroke="black"/>
  <text x="470" y="368" font-family="Arial" font-size="15">Причина, тип проблемы, ожидаемое решение</text>
  <rect x="454" y="414" width="380" height="88" fill="none" stroke="black"/>
  <text x="470" y="452" font-family="Arial" font-size="15">Комментарий, вложения, internal note</text>
  <rect x="454" y="522" width="380" height="96" fill="none" stroke="black"/>
  <text x="470" y="558" font-family="Arial" font-size="15">Preview компенсации, лимит роли, SLA</text>
  <text x="470" y="586" font-family="Arial" font-size="15">Ошибки валидации через STR_MNEMO_*</text>
  <rect x="880" y="184" width="272" height="500" fill="none" stroke="black"/>
  <text x="902" y="220" font-family="Arial" font-size="18">Действия</text>
  <rect x="902" y="250" width="228" height="48" fill="none" stroke="black"/>
  <text x="930" y="280" font-family="Arial" font-size="15">Сохранить черновик</text>
  <rect x="902" y="318" width="228" height="48" fill="none" stroke="black"/>
  <text x="930" y="348" font-family="Arial" font-size="15">Отправить претензию</text>
  <rect x="902" y="386" width="228" height="48" fill="none" stroke="black"/>
  <text x="930" y="416" font-family="Arial" font-size="15">Передать супервизору</text>
  <rect x="902" y="474" width="228" height="96" fill="none" stroke="black"/>
  <text x="922" y="512" font-family="Arial" font-size="15">Результат: claimNumber,</text>
  <text x="922" y="540" font-family="Arial" font-size="15">status, slaDueAt, nextAction</text>
</svg>
