<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840">
  <title>Feature 021. Детальная карточка претензии сотрудника</title>
  <desc>Схематичный wireframe маршрута /employee/claims-history/:claimId без визуальных стилей.</desc>
  <rect x="20" y="20" width="1160" height="800" fill="white" stroke="black"/>
  <text x="48" y="60" font-family="Arial" font-size="24">/employee/claims-history/:claimId — карточка претензии</text>
  <rect x="48" y="88" width="1104" height="86" fill="none" stroke="black"/>
  <text x="70" y="122" font-family="Arial" font-size="17">Header: claimNumber, статус, SLA, заказ, клиент/партнер, masked contact, availableActions</text>
  <text x="70" y="150" font-family="Arial" font-size="15">Действия доступны по роли, статусу, сумме компенсации и результатам проверки</text>
  <rect x="48" y="198" width="348" height="250" fill="none" stroke="black"/>
  <text x="70" y="232" font-family="Arial" font-size="18">Состав претензии</text>
  <text x="70" y="270" font-family="Arial" font-size="15">Позиции, quantity, problemType</text>
  <text x="70" y="300" font-family="Arial" font-size="15">Requested и approved resolution</text>
  <text x="70" y="330" font-family="Arial" font-size="15">Вложения metadata без storage paths</text>
  <text x="70" y="360" font-family="Arial" font-size="15">Публичные и internal комментарии разделены</text>
  <rect x="426" y="198" width="348" height="250" fill="none" stroke="black"/>
  <text x="448" y="232" font-family="Arial" font-size="18">Компенсация и решение</text>
  <text x="448" y="270" font-family="Arial" font-size="15">Preview, approved amount, currency</text>
  <text x="448" y="300" font-family="Arial" font-size="15">Refund, replacement, missing item</text>
  <text x="448" y="330" font-family="Arial" font-size="15">Rejected items и publicReasonMnemonic</text>
  <text x="448" y="360" font-family="Arial" font-size="15">Supervisor approval при превышении лимита</text>
  <rect x="804" y="198" width="348" height="250" fill="none" stroke="black"/>
  <text x="826" y="232" font-family="Arial" font-size="18">Маршрут исполнения</text>
  <text x="826" y="270" font-family="Arial" font-size="15">Warehouse task</text>
  <text x="826" y="300" font-family="Arial" font-size="15">Finance task</text>
  <text x="826" y="330" font-family="Arial" font-size="15">Customer support task</text>
  <text x="826" y="360" font-family="Arial" font-size="15">Статусы исполнения рассчитывает backend</text>
  <rect x="48" y="478" width="538" height="268" fill="none" stroke="black"/>
  <text x="70" y="512" font-family="Arial" font-size="18">Timeline статусов</text>
  <text x="70" y="552" font-family="Arial" font-size="15">Создана, назначена, проверка склада, решение, финансы, завершение</text>
  <text x="70" y="584" font-family="Arial" font-size="15">Каждое событие: sourceSystem, occurredAt, actor, correlationId</text>
  <rect x="616" y="478" width="536" height="268" fill="none" stroke="black"/>
  <text x="638" y="512" font-family="Arial" font-size="18">Audit trail employee-контура</text>
  <text x="638" y="552" font-family="Arial" font-size="15">Просмотры, изменения, переходы, вложения, расчеты, approvals</text>
  <text x="638" y="584" font-family="Arial" font-size="15">Видимость зависит от роли сотрудника или супервизора</text>
  <text x="638" y="616" font-family="Arial" font-size="15">Не попадает в публичную клиентскую историю как комментарий</text>
</svg>
