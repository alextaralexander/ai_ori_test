<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Feature 024 impersonation panel layout</title>
  <desc id="desc">Схематичный макет панели имперсонации и баннера активной сервисной сессии.</desc>
  <rect x="24" y="24" width="1152" height="712" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <rect x="56" y="56" width="1088" height="76" fill="#fff1f0" stroke="#aa3333"/>
  <text x="80" y="102" font-family="Arial" font-size="22">auth-impersonation-banner: actor, target, reason, expiresAt, finish action</text>
  <rect x="56" y="168" width="500" height="520" fill="#ffffff" stroke="#555555"/>
  <text x="80" y="206" font-family="Arial" font-size="20">auth-impersonation-panel</text>
  <rect x="80" y="244" width="420" height="42" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="272" font-family="Arial" font-size="16">target user search / targetUserId</text>
  <rect x="80" y="306" width="420" height="42" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="334" font-family="Arial" font-size="16">targetRole</text>
  <rect x="80" y="368" width="420" height="42" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="396" font-family="Arial" font-size="16">reasonCode</text>
  <rect x="80" y="430" width="420" height="92" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="470" font-family="Arial" font-size="16">reasonText</text>
  <rect x="80" y="542" width="200" height="42" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="570" font-family="Arial" font-size="16">durationMinutes</text>
  <rect x="300" y="542" width="200" height="42" fill="#ffffff" stroke="#777777"/>
  <text x="316" y="570" font-family="Arial" font-size="16">elevatedSessionId</text>
  <rect x="80" y="616" width="420" height="46" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="96" y="646" font-family="Arial" font-size="16">start impersonation</text>
  <rect x="604" y="168" width="540" height="520" fill="#ffffff" stroke="#555555"/>
  <text x="628" y="206" font-family="Arial" font-size="20">session and audit state</text>
  <rect x="628" y="244" width="460" height="88" fill="#f7f7f7" stroke="#777777"/>
  <text x="650" y="278" font-family="Arial" font-size="16">active impersonation session</text>
  <text x="650" y="306" font-family="Arial" font-size="14">impersonationSessionId, actorUserId, targetUserId</text>
  <rect x="628" y="364" width="460" height="88" fill="#f7f7f7" stroke="#777777"/>
  <text x="650" y="398" font-family="Arial" font-size="16">role policies and allowed routes</text>
  <text x="650" y="426" font-family="Arial" font-size="14">target context is limited by policy</text>
  <rect x="628" y="484" width="460" height="88" fill="#f7f7f7" stroke="#777777"/>
  <text x="650" y="518" font-family="Arial" font-size="16">audit trail</text>
  <text x="650" y="546" font-family="Arial" font-size="14">AUTH_IMPERSONATION_STARTED / FINISHED</text>
  <rect x="628" y="610" width="220" height="46" fill="#fff1f0" stroke="#aa3333"/>
  <text x="650" y="640" font-family="Arial" font-size="16">finish impersonation</text>
  <rect x="868" y="610" width="220" height="46" fill="#ffffff" stroke="#777777"/>
  <text x="890" y="640" font-family="Arial" font-size="16">restore actor context</text>
  <path d="M556 420 H604" stroke="#222222" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222222"/>
    </marker>
  </defs>
</svg>
