<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Feature 025 consent and analytics diagnostics layout</title>
  <desc id="desc">Схематичный макет панели consent и диагностики analytics channels для администратора трекинга.</desc>
  <rect x="24" y="24" width="1152" height="712" fill="#ffffff" stroke="#222222" stroke-width="2"/>
