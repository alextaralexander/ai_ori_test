<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Feature 026 admin RBAC accounts and roles layout</title>
  <desc id="desc">Схематичный макет админского экрана управления внутренними учетными записями, ролями, permission sets и preview прав.</desc>
  <rect x="24" y="24" width="1232" height="752" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <rect x="56" y="56" width="1168" height="72" fill="#f5f5f5" stroke="#555555"/>
  <text x="80" y="100" font-family="Arial" font-size="24">admin-rbac-page / accounts and roles</text>

  <rect x="56" y="152" width="248" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="80" y="190" font-family="Arial" font-size="20">Admin navigation</text>
  <rect x="80" y="224" width="188" height="44" fill="#f7f7f7" stroke="#777777"/>
  <text x="96" y="252" font-family="Arial" font-size="15">Accounts</text>
  <rect x="80" y="284" width="188" height="44" fill="#f7f7f7" stroke="#777777"/>
  <text x="96" y="312" font-family="Arial" font-size="15">Roles</text>
  <rect x="80" y="344" width="188" height="44" fill="#f7f7f7" stroke="#777777"/>
  <text x="96" y="372" font-family="Arial" font-size="15">Permission sets</text>
  <rect x="80" y="404" width="188" height="44" fill="#f7f7f7" stroke="#777777"/>
  <text x="96" y="432" font-family="Arial" font-size="15">Responsibility scopes</text>
  <rect x="80" y="464" width="188" height="44" fill="#f7f7f7" stroke="#777777"/>
  <text x="96" y="492" font-family="Arial" font-size="15">Audit</text>

  <rect x="336" y="152" width="476" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="360" y="190" font-family="Arial" font-size="20">admin-rbac-account-table</text>
  <rect x="360" y="220" width="420" height="46" fill="#ffffff" stroke="#777777"/>
  <text x="376" y="249" font-family="Arial" font-size="15">filters: status / department / role / query</text>
  <rect x="360" y="286" width="420" height="248" fill="#f7f7f7" stroke="#777777"/>
  <text x="376" y="318" font-family="Arial" font-size="15">rows: employee accounts</text>
  <line x1="376" y1="350" x2="760" y2="350" stroke="#999999"/>
  <line x1="376" y1="394" x2="760" y2="394" stroke="#999999"/>
  <line x1="376" y1="438" x2="760" y2="438" stroke="#999999"/>
  <line x1="376" y1="482" x2="760" y2="482" stroke="#999999"/>
  <rect x="360" y="566" width="188" height="48" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="376" y="596" font-family="Arial" font-size="15">create account</text>
  <rect x="592" y="566" width="188" height="48" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="608" y="596" font-family="Arial" font-size="15">block/deactivate</text>

  <rect x="844" y="152" width="380" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="868" y="190" font-family="Arial" font-size="20">admin-rbac-account-form</text>
  <rect x="868" y="222" width="316" height="38" fill="#ffffff" stroke="#777777"/>
  <text x="884" y="247" font-family="Arial" font-size="14">fullName / email / phone</text>
  <rect x="868" y="276" width="316" height="38" fill="#ffffff" stroke="#777777"/>
  <text x="884" y="301" font-family="Arial" font-size="14">department / position / status</text>
  <rect x="868" y="334" width="316" height="88" fill="#ffffff" stroke="#777777"/>
  <text x="884" y="366" font-family="Arial" font-size="14">admin-rbac-role-assignment</text>
  <text x="884" y="392" font-family="Arial" font-size="14">roles and permission sets</text>
  <rect x="868" y="442" width="316" height="78" fill="#ffffff" stroke="#777777"/>
  <text x="884" y="474" font-family="Arial" font-size="14">responsibility scopes</text>
  <text x="884" y="498" font-family="Arial" font-size="14">region / warehouse / department</text>
  <rect x="868" y="542" width="316" height="88" fill="#f7f7f7" stroke="#777777"/>
  <text x="884" y="574" font-family="Arial" font-size="14">admin-rbac-permission-preview</text>
  <text x="884" y="600" font-family="Arial" font-size="14">effective permissions / conflicts</text>
  <rect x="868" y="660" width="146" height="44" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="884" y="688" font-family="Arial" font-size="14">save</text>
  <rect x="1038" y="660" width="146" height="44" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="1054" y="688" font-family="Arial" font-size="14">require MFA</text>

  <path d="M812 444 H844" stroke="#222222" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222222"/>
    </marker>
  </defs>
</svg>
