<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Feature 026 admin RBAC security, service accounts and audit layout</title>
  <desc id="desc">Схематичный макет админского экрана security policies, служебных учетных записей, emergency deactivation и audit trail.</desc>
  <rect x="24" y="24" width="1232" height="752" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <rect x="56" y="56" width="1168" height="72" fill="#f5f5f5" stroke="#555555"/>
  <text x="80" y="100" font-family="Arial" font-size="24">admin RBAC security / service accounts / audit</text>

  <rect x="56" y="152" width="360" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="80" y="190" font-family="Arial" font-size="20">admin-rbac-security-policy</text>
  <rect x="80" y="226" width="292" height="58" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="260" font-family="Arial" font-size="15">password policy controls</text>
  <rect x="80" y="308" width="292" height="58" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="342" font-family="Arial" font-size="15">MFA policy controls</text>
  <rect x="80" y="390" width="292" height="58" fill="#ffffff" stroke="#777777"/>
  <text x="96" y="424" font-family="Arial" font-size="15">session policy controls</text>
  <rect x="80" y="484" width="292" height="86" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="96" y="518" font-family="Arial" font-size="15">elevated session required</text>
  <text x="96" y="546" font-family="Arial" font-size="14">policy preview before save</text>
  <rect x="80" y="610" width="292" height="58" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="96" y="644" font-family="Arial" font-size="15">save security policy</text>

  <rect x="456" y="152" width="360" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="480" y="190" font-family="Arial" font-size="20">admin-rbac-service-account-table</text>
  <rect x="480" y="226" width="292" height="48" fill="#ffffff" stroke="#777777"/>
  <text x="496" y="256" font-family="Arial" font-size="15">integration type / owner / status</text>
  <rect x="480" y="296" width="292" height="176" fill="#f7f7f7" stroke="#777777"/>
  <text x="496" y="328" font-family="Arial" font-size="15">service account rows</text>
  <line x1="496" y1="360" x2="752" y2="360" stroke="#999999"/>
  <line x1="496" y1="404" x2="752" y2="404" stroke="#999999"/>
  <line x1="496" y1="448" x2="752" y2="448" stroke="#999999"/>
  <rect x="480" y="504" width="292" height="72" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="496" y="536" font-family="Arial" font-size="15">one-time secret display</text>
  <text x="496" y="560" font-family="Arial" font-size="14">masked after close</text>
  <rect x="480" y="610" width="130" height="58" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="496" y="644" font-family="Arial" font-size="15">rotate</text>
  <rect x="642" y="610" width="130" height="58" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="658" y="644" font-family="Arial" font-size="15">disable</text>

  <rect x="856" y="152" width="368" height="584" fill="#ffffff" stroke="#555555"/>
  <text x="880" y="190" font-family="Arial" font-size="20">admin-rbac-audit-table</text>
  <rect x="880" y="226" width="300" height="48" fill="#ffffff" stroke="#777777"/>
  <text x="896" y="256" font-family="Arial" font-size="15">filters: actor / target / date</text>
  <rect x="880" y="296" width="300" height="188" fill="#f7f7f7" stroke="#777777"/>
  <text x="896" y="328" font-family="Arial" font-size="15">immutable audit events</text>
  <line x1="896" y1="360" x2="1160" y2="360" stroke="#999999"/>
  <line x1="896" y1="404" x2="1160" y2="404" stroke="#999999"/>
  <line x1="896" y1="448" x2="1160" y2="448" stroke="#999999"/>
  <rect x="880" y="518" width="300" height="82" fill="#fffbe6" stroke="#aa8a00"/>
  <text x="896" y="550" font-family="Arial" font-size="15">admin-rbac-emergency-deactivate</text>
  <text x="896" y="574" font-family="Arial" font-size="14">confirmation + MFA challenge</text>
  <rect x="880" y="630" width="140" height="48" fill="#e8f1ff" stroke="#3366aa"/>
  <text x="896" y="660" font-family="Arial" font-size="15">export audit</text>
  <rect x="1040" y="630" width="140" height="48" fill="#ffffff" stroke="#777777"/>
  <text x="1056" y="660" font-family="Arial" font-size="15">open diff</text>

  <path d="M416 444 H456" stroke="#222222" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M816 444 H856" stroke="#222222" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222222"/>
    </marker>
  </defs>
</svg>
