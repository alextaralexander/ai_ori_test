<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Макет PIM категорий и медиа">
  <title>Feature 029 - PIM категории и медиа</title>
  <rect width="1280" height="760" fill="#ffffff" stroke="#111827"/>
  <rect x="0" y="0" width="1280" height="64" fill="#f3f4f6" stroke="#111827"/>
