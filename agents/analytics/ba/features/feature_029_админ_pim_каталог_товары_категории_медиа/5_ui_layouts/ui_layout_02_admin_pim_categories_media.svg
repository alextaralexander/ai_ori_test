  <rect x="24" y="92" width="396" height="612" fill="#ffffff" stroke="#111827"/>
  <text x="44" y="124" font-family="Arial" font-size="16">Tree view категорий</text>
  <text x="64" y="164" font-family="Arial" font-size="13">catalog-root</text>
  <text x="84" y="196" font-family="Arial" font-size="13">Уход за лицом / face-care</text>
  <text x="104" y="228" font-family="Arial" font-size="13">Сыворотки / face-serums</text>
  <text x="104" y="260" font-family="Arial" font-size="13">Кремы / face-creams</text>
  <text x="84" y="292" font-family="Arial" font-size="13">Макияж / makeup</text>
