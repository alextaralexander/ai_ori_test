  <rect x="200" y="330" width="144" height="30" fill="#eef2ff" stroke="#4b5563"/><text x="214" y="350" font-family="Arial" font-size="12">Переместить</text>
  <rect x="448" y="92" width="376" height="612" fill="#ffffff" stroke="#111827"/>
  <text x="468" y="124" font-family="Arial" font-size="16">Форма категории</text>
  <rect x="468" y="150" width="320" height="34" fill="#f9fafb" stroke="#9ca3af"/><text x="480" y="172" font-family="Arial" font-size="13">Slug, name, locale, status</text>
  <rect x="468" y="198" width="320" height="34" fill="#f9fafb" stroke="#9ca3af"/><text x="480" y="220" font-family="Arial" font-size="13">Parent, sortOrder, audience</text>
  <rect x="468" y="246" width="320" height="58" fill="#f9fafb" stroke="#9ca3af"/><text x="480" y="272" font-family="Arial" font-size="13">SEO meta и preview image</text>
  <rect x="468" y="318" width="320" height="58" fill="#f9fafb" stroke="#9ca3af"/><text x="480" y="344" font-family="Arial" font-size="13">Publication window</text>
  <rect x="468" y="394" width="320" height="72" fill="#fff7ed" stroke="#c2410c"/><text x="480" y="421" font-family="Arial" font-size="13">Validation: unique slug, no cycle</text>
