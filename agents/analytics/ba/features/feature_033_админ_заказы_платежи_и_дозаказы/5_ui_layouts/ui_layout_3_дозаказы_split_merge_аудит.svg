  <text x="188" y="816" font-family="Arial" font-size="14" fill="#ffffff">Создать дозаказ</text>

  <rect x="506" y="176" width="430" height="720" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="530" y="212" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Split / merge fulfillment</text>
  <rect x="530" y="250" width="358" height="108" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
