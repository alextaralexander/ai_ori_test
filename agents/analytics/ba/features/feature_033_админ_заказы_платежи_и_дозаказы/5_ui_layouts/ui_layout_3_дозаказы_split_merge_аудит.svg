  <text x="1006" y="452" font-family="Arial" font-size="12" fill="#667085">parent BO-033-1001 • child BO-033-1001-S1</text>
  <rect x="988" y="494" width="356" height="78" rx="4" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="1006" y="522" font-family="Arial" font-size="13" font-weight="700" fill="#111827">00:09 FINANCIAL_INVARIANT_CHECKED</text>
  <text x="1006" y="546" font-family="Arial" font-size="12" fill="#667085">result PASSED • correlation ORD-033-INV-1</text>
