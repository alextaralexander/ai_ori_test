<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Feature 033. Дозаказы, split/merge и аудит</title>
  <desc id="desc">Схематичный макет административных операций supplementary order, split/merge и audit trail.</desc>
  <rect width="1440" height="980" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1440" height="64" fill="#182230"/>
  <text x="32" y="40" font-family="Arial" font-size="22" fill="#ffffff">Best Ori Gin Admin</text>
  <text x="1210" y="40" font-family="Arial" font-size="16" fill="#d9e2ec">Order support</text>

  <text x="48" y="112" font-family="Arial" font-size="28" font-weight="700" fill="#111827">Дозаказы, split/merge и аудит заказа</text>
  <text x="48" y="142" font-family="Arial" font-size="15" fill="#667085">Операторские сценарии с проверкой каталога, склада, оплаты, антифрода и audit reason</text>

  <rect x="48" y="176" width="430" height="720" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
