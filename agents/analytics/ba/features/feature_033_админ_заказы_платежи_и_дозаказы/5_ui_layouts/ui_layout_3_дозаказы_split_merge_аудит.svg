  <text x="90" y="436" font-family="Arial" font-size="14" fill="#111827">SKU-033-ADDON • Крем ночной</text>
  <text x="90" y="462" font-family="Arial" font-size="13" fill="#047857">Доступно: 42 • Цена: 1 890 ₽ • Лимит: OK</text>
  <text x="72" y="530" font-family="Arial" font-size="13" fill="#475467">Проверки</text>
  <text x="72" y="560" font-family="Arial" font-size="13" fill="#047857">✓ каталог активен</text>
  <text x="72" y="584" font-family="Arial" font-size="13" fill="#047857">✓ SKU доступен на складе WH-033</text>
