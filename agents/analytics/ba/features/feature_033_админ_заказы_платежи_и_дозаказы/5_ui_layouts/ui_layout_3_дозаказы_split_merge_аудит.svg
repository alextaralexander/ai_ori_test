  <text x="72" y="632" font-family="Arial" font-size="13" fill="#047857">✓ financial invariant valid</text>
  <text x="72" y="690" font-family="Arial" font-size="13" fill="#475467">reasonCode</text>
  <rect x="72" y="704" width="356" height="38" rx="4" fill="#f9fafb" stroke="#cbd5e1"/>
  <text x="90" y="728" font-family="Arial" font-size="13" fill="#111827">CUSTOMER_REQUEST</text>
