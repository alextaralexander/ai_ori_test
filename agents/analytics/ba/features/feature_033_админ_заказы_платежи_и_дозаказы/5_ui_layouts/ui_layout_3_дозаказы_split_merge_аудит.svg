  <text x="746" y="524" font-family="Arial" font-size="13" fill="#475467">3 SKU</text>
  <text x="746" y="548" font-family="Arial" font-size="13" fill="#475467">WH-017</text>
  <text x="746" y="572" font-family="Arial" font-size="13" fill="#b45309">PARTIAL</text>
  <text x="530" y="658" font-family="Arial" font-size="13" fill="#475467">Проверка инвариантов</text>
  <rect x="530" y="676" width="358" height="68" rx="4" fill="#ecfdf5" stroke="#86efac"/>
