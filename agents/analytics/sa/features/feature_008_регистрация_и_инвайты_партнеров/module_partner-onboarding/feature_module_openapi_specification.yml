openapi: 3.0.3
info:
  title: Best Ori Gin Partner Onboarding API - Feature 008
  version: 1.0.0
  description: Контракты регистрации и инвайтов партнеров для module partner-onboarding.
servers:
  - url: /api/partner-onboarding
tags:
  - name: Invite
  - name: Registration
  - name: Activation
  - name: SponsorCabinet
paths:
  /invites/validate:
    get:
      tags: [Invite]
      summary: Проверить invite/referral-код перед регистрацией.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 64
        - name: onboardingType
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/OnboardingType'
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
      responses:
        '200':
          description: Результат проверки кода.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteValidationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /registrations:
    post:
      tags: [Registration]
      summary: Создать registration application для beauty/business partner.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 120
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationApplicationRequest'
      responses:
        '201':
          description: Заявка создана.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationApplicationResponse'
        '200':
          description: Повторный idempotent submit вернул существующую заявку.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Дубликат контакта или конфликт атрибуции.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /activations/{token}:
    get:
      tags: [Activation]
      summary: Получить состояние активации приглашенного партнера.
      parameters:
        - $ref: '#/components/parameters/ActivationToken'
      responses:
        '200':
          description: Состояние активации.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationStateResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /activations/{token}/confirm-contact:
    post:
      tags: [Activation]
      summary: Подтвердить контакт одноразовым кодом.
      parameters:
        - $ref: '#/components/parameters/ActivationToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactConfirmationRequest'
      responses:
        '200':
          description: Контакт подтвержден или возвращено контролируемое состояние ошибки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationStateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /activations/{token}/complete:
    post:
      tags: [Activation]
      summary: Завершить активацию partner profile.
      parameters:
        - $ref: '#/components/parameters/ActivationToken'
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 120
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationCompleteRequest'
      responses:
        '200':
          description: Partner profile активирован или возвращен текущий результат.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationCompleteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Условия активации не выполнены.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sponsor-cabinet/invites:
    get:
      tags: [SponsorCabinet]
      summary: Получить invite-записи текущего спонсора.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/InviteStatus'
        - name: onboardingType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OnboardingType'
      responses:
        '200':
          description: Список invite текущего спонсора.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorInviteListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [SponsorCabinet]
      summary: Создать invite для beauty/business onboarding.
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 120
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '201':
          description: Invite создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorInviteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
  /sponsor-cabinet/invites/{inviteId}/resend:
    post:
      tags: [SponsorCabinet]
      summary: Повторно отправить или подготовить invite-ссылку без создания дубля.
      security:
        - bearerAuth: []
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendInviteRequest'
      responses:
        '200':
          description: Повторная отправка принята или возвращена ссылка для копирования.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorInviteResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ActivationToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 160
  responses:
    ValidationError:
      description: Ошибка валидации запроса без hardcoded пользовательского текста.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Требуется авторизация.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Действие запрещено текущей роли.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Объект не найден или недоступен.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OnboardingType:
      type: string
      enum: [BEAUTY_PARTNER, BUSINESS_PARTNER]
    InviteStatus:
      type: string
      enum: [CREATED, OPENED, REGISTRATION_STARTED, SUBMITTED, ACTIVE, EXPIRED, REJECTED, DISABLED]
    ApplicationStatus:
      type: string
      enum: [PENDING_CONTACT_CONFIRMATION, PENDING_CRM_REVIEW, READY_FOR_ACTIVATION, ACTIVE, REJECTED, EXPIRED]
    InviteValidationStatus:
      type: string
      enum: [ACTIVE, NOT_FOUND, EXPIRED, DISABLED, ALREADY_USED, TYPE_MISMATCH]
    PublicSponsorContext:
      type: object
      required: [displayNameKey, publicCode]
      properties:
        displayNameKey:
          type: string
          maxLength: 180
        publicCode:
          type: string
          maxLength: 64
        avatarUrl:
          type: string
          nullable: true
    InviteValidationResponse:
      type: object
      required: [status, onboardingType, messageCode]
      properties:
        status:
          $ref: '#/components/schemas/InviteValidationStatus'
        onboardingType:
          $ref: '#/components/schemas/OnboardingType'
        campaignId:
          type: string
          nullable: true
        sponsor:
          $ref: '#/components/schemas/PublicSponsorContext'
        messageCode:
          type: string
          example: STR_MNEMO_INVITE_CODE_INVALID
    RegistrationApplicationRequest:
      type: object
      required: [onboardingType, candidateName, contact, consentVersions]
      properties:
        onboardingType:
          $ref: '#/components/schemas/OnboardingType'
        inviteCode:
          type: string
          maxLength: 64
        candidateName:
          type: string
          minLength: 2
          maxLength: 180
        contact:
          $ref: '#/components/schemas/ContactRequest'
        campaignId:
          type: string
          maxLength: 80
        landingType:
          type: string
          maxLength: 40
        landingVariant:
          type: string
          maxLength: 80
        sourceRoute:
          type: string
          maxLength: 220
        consentVersions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ConsentAcceptance'
    ContactRequest:
      type: object
      required: [channel, value]
      properties:
        channel:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
          minLength: 5
          maxLength: 160
    ConsentAcceptance:
      type: object
      required: [code, version, accepted]
      properties:
        code:
          type: string
          maxLength: 80
        version:
          type: string
          maxLength: 40
        accepted:
          type: boolean
    RegistrationApplicationResponse:
      type: object
      required: [applicationId, applicationNumber, status, nextAction, messageCode]
      properties:
        applicationId:
          type: string
          format: uuid
        applicationNumber:
          type: string
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        nextAction:
          type: string
          enum: [CONFIRM_CONTACT, WAIT_CRM_REVIEW, OPEN_ACTIVATION, LOGIN_EXISTING_ACCOUNT]
        activationRoute:
          type: string
          nullable: true
        messageCode:
          type: string
          example: STR_MNEMO_REGISTRATION_APPLICATION_CREATED
    ContactConfirmationRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 12
    ActivationStateResponse:
      type: object
      required: [applicationId, status, contactConfirmed, termsAccepted, messageCode]
      properties:
        applicationId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        contactConfirmed:
          type: boolean
        termsAccepted:
          type: boolean
        sponsor:
          $ref: '#/components/schemas/PublicSponsorContext'
        messageCode:
          type: string
          example: STR_MNEMO_ACTIVATION_READY
    ActivationCompleteRequest:
      type: object
      required: [acceptedTerms]
      properties:
        acceptedTerms:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ConsentAcceptance'
    ActivationCompleteResponse:
      type: object
      required: [partnerProfileId, partnerNumber, status, referralLink, messageCode]
      properties:
        partnerProfileId:
          type: string
          format: uuid
        partnerNumber:
          type: string
        status:
          type: string
          enum: [ACTIVE]
        referralLink:
          $ref: '#/components/schemas/ReferralLinkResponse'
        messageCode:
          type: string
          example: STR_MNEMO_PARTNER_ACTIVATED
    ReferralLinkResponse:
      type: object
      required: [referralCode, targetRoute]
      properties:
        referralCode:
          type: string
        targetRoute:
          type: string
    CreateInviteRequest:
      type: object
      required: [onboardingType, campaignId]
      properties:
        onboardingType:
          $ref: '#/components/schemas/OnboardingType'
        campaignId:
          type: string
          maxLength: 80
        candidatePublicName:
          type: string
          maxLength: 160
    ResendInviteRequest:
      type: object
      properties:
        channel:
          type: string
          enum: [COPY_LINK, EMAIL, SMS]
    SponsorInviteListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SponsorInviteResponse'
    SponsorInviteResponse:
      type: object
      required: [inviteId, code, onboardingType, status, targetRoute, expiresAt]
      properties:
        inviteId:
          type: string
          format: uuid
        code:
          type: string
        onboardingType:
          $ref: '#/components/schemas/OnboardingType'
        status:
          $ref: '#/components/schemas/InviteStatus'
        targetRoute:
          type: string
        candidatePublicName:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
        lastOpenedAt:
          type: string
          format: date-time
          nullable: true
        messageCode:
          type: string
          example: STR_MNEMO_INVITE_CREATED
    ErrorResponse:
      type: object
      required: [code, messageCode]
      properties:
        code:
          type: string
          example: INVITE_CODE_INVALID
        messageCode:
          type: string
          example: STR_MNEMO_INVITE_CODE_INVALID
        details:
          type: object
          additionalProperties:
            type: string
