openapi: 3.0.3
info:
  title: Best Ori Gin module_order API for feature 011
  version: 1.0.0
  description: Order history, order details and repeat order contracts for feature 011.
servers:
  - url: /api
tags:
  - name: OrderHistory
    description: Personal order history, details, events, warnings and repeat order actions.
paths:
  /order/order-history:
    get:
      tags: [OrderHistory]
      operationId: searchOrderHistory
      summary: Search personal order history
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
        - name: orderType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderType'
        - name: orderStatus
          in: query
          required: false
          schema:
            type: string
        - name: paymentStatus
          in: query
          required: false
          schema:
            type: string
        - name: deliveryStatus
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Page of orders owned by the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderHistoryPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /order/order-history/{orderNumber}:
    get:
      tags: [OrderHistory]
      operationId: getOrderHistoryDetails
      summary: Read personal order details
      parameters:
        - $ref: '#/components/parameters/OrderNumber'
      responses:
        '200':
          description: Order details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /order/order-history/{orderNumber}/repeat:
    post:
      tags: [OrderHistory]
      operationId: repeatOrder
      summary: Repeat available order lines into the matching cart context
      parameters:
        - $ref: '#/components/parameters/OrderNumber'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Repeat order result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepeatOrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  parameters:
    OrderNumber:
      name: orderNumber
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
  responses:
    Unauthorized:
      description: User is not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: User is not allowed to access the order.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Order not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request or business validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OrderType:
      type: string
      enum: [MAIN, SUPPLEMENTARY]
    OrderHistoryPageResponse:
      type: object
      required: [items, page, size, totalElements, hasNext]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryItemResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        hasNext:
          type: boolean
    OrderHistoryItemResponse:
      type: object
      required: [orderNumber, orderType, campaignId, createdAt, orderStatus, paymentStatus, deliveryStatus, grandTotalAmount, currencyCode]
      properties:
        orderNumber:
          type: string
        orderType:
          $ref: '#/components/schemas/OrderType'
        campaignId:
          type: string
        createdAt:
          type: string
          format: date-time
        orderStatus:
          type: string
        paymentStatus:
          type: string
        deliveryStatus:
          type: string
        grandTotalAmount:
          type: number
        currencyCode:
          type: string
        summaryItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineResponse'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/OrderWarningResponse'
    OrderDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/OrderHistoryItemResponse'
        - type: object
          required: [items, totals, delivery, payment, events, actions]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderLineResponse'
            totals:
              $ref: '#/components/schemas/OrderTotalsResponse'
            delivery:
              $ref: '#/components/schemas/OrderDeliveryResponse'
            payment:
              $ref: '#/components/schemas/OrderPaymentResponse'
            events:
              type: array
              items:
                $ref: '#/components/schemas/OrderEventResponse'
            actions:
              $ref: '#/components/schemas/OrderActionsResponse'
    OrderLineResponse:
      type: object
      required: [productCode, sku, productName, quantity, unitPrice, totalPrice, gift]
      properties:
        productCode:
          type: string
        sku:
          type: string
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        discountAmount:
          type: number
        totalPrice:
          type: number
        gift:
          type: boolean
        repeatAvailable:
          type: boolean
        claimAvailable:
          type: boolean
        limitationReasonMnemo:
          type: string
          pattern: '^STR_MNEMO_.*'
    OrderTotalsResponse:
      type: object
      required: [subtotalAmount, deliveryAmount, discountAmount, walletAmount, cashbackAmount, grandTotalAmount]
      properties:
        subtotalAmount:
          type: number
        deliveryAmount:
          type: number
        discountAmount:
          type: number
        walletAmount:
          type: number
        cashbackAmount:
          type: number
        grandTotalAmount:
          type: number
    OrderDeliveryResponse:
      type: object
      properties:
        deliveryTargetType:
          type: string
          enum: [ADDRESS, PICKUP_POINT]
        maskedRecipientName:
          type: string
        maskedPhone:
          type: string
        city:
          type: string
        addressLine:
          type: string
        expectedInterval:
          type: string
        trackingNumber:
          type: string
    OrderPaymentResponse:
      type: object
      properties:
        paymentMethodCode:
          type: string
        paymentStatus:
          type: string
        amountToPay:
          type: number
        paidAmount:
          type: number
        paymentActionAvailable:
          type: boolean
    OrderEventResponse:
      type: object
      required: [eventType, publicStatus, sourceSystem, occurredAt]
      properties:
        eventType:
          type: string
        publicStatus:
          type: string
        sourceSystem:
          type: string
        descriptionMnemo:
          type: string
          pattern: '^STR_MNEMO_.*'
        occurredAt:
          type: string
          format: date-time
    OrderWarningResponse:
      type: object
      required: [severity, warningMnemo]
      properties:
        severity:
          type: string
          enum: [INFO, WARNING, BLOCKING]
        warningMnemo:
          type: string
          pattern: '^STR_MNEMO_.*'
        target:
          type: string
    OrderActionsResponse:
      type: object
      properties:
        paymentAvailable:
          type: boolean
        repeatOrderAvailable:
          type: boolean
        claimAvailable:
          type: boolean
    RepeatOrderResponse:
      type: object
      required: [status, targetCartType, addedItems, rejectedItems]
      properties:
        status:
          type: string
          enum: [COMPLETED, PARTIAL, REJECTED]
        targetCartType:
          $ref: '#/components/schemas/OrderType'
        addedItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineResponse'
        rejectedItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineResponse'
        reasonMnemo:
          type: string
          pattern: '^STR_MNEMO_.*'
    ErrorResponse:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: '^STR_MNEMO_.*'
        details:
          type: array
          items:
            $ref: '#/components/schemas/OrderWarningResponse'
