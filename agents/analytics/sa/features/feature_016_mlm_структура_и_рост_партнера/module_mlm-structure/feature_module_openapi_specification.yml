openapi: 3.1.0
info:
  title: Best Ori Gin MLM Structure API
  version: 0.1.0-feature016
servers:
  - url: /
paths:
  /api/mlm-structure/dashboard:
    get:
      summary: Dashboard MLM-структуры партнера
      parameters:
        - name: campaignId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Dashboard текущей кампании
        '403':
          description: STR_MNEMO_MLM_STRUCTURE_ACCESS_DENIED
  /api/mlm-structure/community:
    get:
      summary: Downline и beauty community
      parameters:
        - name: campaignId
          in: query
          schema: { type: string }
        - name: level
          in: query
          schema: { type: integer }
        - name: branchId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200': { description: Список партнеров структуры }
  /api/mlm-structure/conversion:
    get:
      summary: Funnel invite-to-first-order
      responses:
        '200': { description: Конверсия приглашений }
  /api/mlm-structure/team-activity:
    get:
      summary: Активность команды
      parameters:
        - name: riskOnly
          in: query
          schema: { type: boolean }
      responses:
        '200': { description: События команды }
  /api/mlm-structure/upgrade:
    get:
      summary: Условия апгрейда партнера
      responses:
        '200': { description: Qualification progress }
  /api/mlm-structure/partners/{personNumber}:
    get:
      summary: Карточка партнера по personNumber
      parameters:
        - name: personNumber
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Карточка партнера }
        '404': { description: STR_MNEMO_MLM_STRUCTURE_PARTNER_NOT_FOUND }
components:
  schemas:
    MlmDashboardResponse:
      type: object
      required: [campaignId, leaderPersonNumber, personalVolume, groupVolume, activePartnerCount, currentRank, nextRank, publicMnemo]
      properties:
        campaignId: { type: string }
        leaderPersonNumber: { type: string }
        personalVolume: { $ref: '#/components/schemas/MlmVolume' }
        groupVolume: { $ref: '#/components/schemas/MlmVolume' }
        activePartnerCount: { type: integer }
        currentRank: { type: string }
        nextRank: { type: string }
        qualificationPercent: { type: number }
        publicMnemo: { type: string }
    MlmVolume:
      type: object
      properties:
        amount: { type: number }
        currencyCode: { type: string }