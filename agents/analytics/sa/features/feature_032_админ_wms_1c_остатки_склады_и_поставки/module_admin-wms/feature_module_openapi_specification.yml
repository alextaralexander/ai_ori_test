openapi: 3.1.0
info:
  title: Best Ori Gin Admin WMS API
  version: 0.1.0-feature-032
  description: >
    Feature 032 API for administration of WMS/1C warehouses, stock snapshots,
    availability rules, supplies, reservations, sync runs, quarantine messages,
    discrepancies and audit events. Runtime Swagger is generated by springdoc-openapi
    under /v3/api-docs/admin-wms and Swagger UI /swagger-ui/admin-wms.
servers:
  - url: /api/admin/wms
security:
  - bearerAuth: []
tags:
  - name: Warehouses
  - name: Stocks
  - name: Supplies
  - name: Reservations
  - name: Sync
  - name: Discrepancies
  - name: Audit
paths:
  /warehouses:
    get:
      tags: [Warehouses]
      summary: Search warehouses
      operationId: searchWarehouses
      security:
        - bearerAuth: [ADMIN_WMS_READ]
      parameters:
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/RegionCode'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Warehouse page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehousePage'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Warehouses]
      summary: Create warehouse
      operationId: createWarehouse
      security:
        - bearerAuth: [ADMIN_WMS_WRITE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehouseRequest'
      responses:
        '201':
          description: Created warehouse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /warehouses/{warehouseId}:
    get:
      tags: [Warehouses]
      summary: Get warehouse details
      operationId: getWarehouse
      security:
        - bearerAuth: [ADMIN_WMS_READ]
      parameters:
        - $ref: '#/components/parameters/WarehouseId'
      responses:
        '200':
          description: Warehouse details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Warehouses]
      summary: Update warehouse metadata or status
      operationId: updateWarehouse
      security:
        - bearerAuth: [ADMIN_WMS_WRITE]
      parameters:
        - $ref: '#/components/parameters/WarehouseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWarehouseRequest'
      responses:
        '200':
          description: Updated warehouse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /stocks:
    get:
      tags: [Stocks]
      summary: Search stock snapshots
      operationId: searchStocks
      security:
        - bearerAuth: [ADMIN_WMS_READ]
      parameters:
        - $ref: '#/components/parameters/WarehouseIdQuery'
        - $ref: '#/components/parameters/Sku'
        - name: catalogPeriodCode
          in: query
          schema: { type: string }
        - name: channelCode
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Stock page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockPage'
  /stocks/{stockItemId}/availability-rule:
    post:
      tags: [Stocks]
      summary: Change SKU availability rule
      operationId: changeAvailabilityRule
      security:
        - bearerAuth: [ADMIN_WMS_WRITE]
      parameters:
        - name: stockItemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeAvailabilityRuleRequest'
      responses:
        '200':
          description: Updated stock availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
  /supplies:
    get:
      tags: [Supplies]
      summary: Search supplies
      operationId: searchSupplies
      security:
        - bearerAuth: [ADMIN_WMS_READ]
      parameters:
        - $ref: '#/components/parameters/WarehouseIdQuery'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Supply page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyPage'
    post:
      tags: [Supplies]
      summary: Create supply
      operationId: createSupply
      security:
        - bearerAuth: [ADMIN_WMS_SUPPLY_WRITE]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplyRequest'
      responses:
        '201':
          description: Created supply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyResponse'
  /supplies/{supplyId}/acceptance:
    post:
      tags: [Supplies]
      summary: Confirm supply acceptance
      operationId: acceptSupply
      security:
        - bearerAuth: [ADMIN_WMS_SUPPLY_WRITE]
      parameters:
        - name: supplyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptSupplyRequest'
      responses:
        '200':
          description: Accepted supply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /reservations:
    post:
      tags: [Reservations]
      summary: Reserve stock for order workflow
      operationId: reserveStock
      security:
        - bearerAuth: [ADMIN_WMS_RESERVATION_WRITE]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /reservations/{reservationId}/release:
    post:
      tags: [Reservations]
      summary: Release reservation
      operationId: releaseReservation
      security:
        - bearerAuth: [ADMIN_WMS_RESERVATION_WRITE]
      parameters:
        - name: reservationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Released reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
  /sync-runs:
    post:
      tags: [Sync]
      summary: Start manual WMS/1C synchronization
      operationId: startSyncRun
      security:
        - bearerAuth: [ADMIN_WMS_SYNC_RUN]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSyncRunRequest'
      responses:
        '202':
          description: Accepted sync run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
  /sync-messages:
    get:
      tags: [Sync]
      summary: Search WMS/1C sync messages
      operationId: searchSyncMessages
      security:
        - bearerAuth: [ADMIN_WMS_READ]
      parameters:
        - name: sourceSystem
          in: query
          schema: { type: string }
        - name: messageStatus
          in: query
          schema: { type: string }
        - name: externalDocumentId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Sync message page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncMessagePage'
  /discrepancies/{discrepancyId}/resolve:
    post:
      tags: [Discrepancies]
      summary: Resolve discrepancy
      operationId: resolveDiscrepancy
      security:
        - bearerAuth: [ADMIN_WMS_DISCREPANCY_RESOLVE]
      parameters:
        - name: discrepancyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveDiscrepancyRequest'
      responses:
        '200':
          description: Resolved discrepancy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscrepancyResponse'
  /audit-events:
    get:
      tags: [Audit]
      summary: Search WMS audit events
      operationId: searchWmsAuditEvents
      security:
        - bearerAuth: [ADMIN_WMS_AUDIT_VIEW]
      parameters:
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: string }
        - name: correlationId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Audit event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPage'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WarehouseId:
      name: warehouseId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WarehouseIdQuery:
      name: warehouseId
      in: query
      schema: { type: string, format: uuid }
    Sku:
      name: sku
      in: query
      schema: { type: string }
    Status:
      name: status
      in: query
      schema: { type: string }
    RegionCode:
      name: regionCode
      in: query
      schema: { type: string }
    Search:
      name: search
      in: query
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 120 }
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Business conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    WarehousePage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/WarehouseResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    WarehouseResponse:
      type: object
      required: [warehouseId, warehouseCode, name, status, sourceSystem, version]
      properties:
        warehouseId: { type: string, format: uuid }
        warehouseCode: { type: string }
        name: { type: string }
        warehouseType: { type: string }
        regionCode: { type: string }
        status: { $ref: '#/components/schemas/WarehouseStatus' }
        sourceSystem: { type: string, enum: [WMS, ONE_C, MANUAL_IMPORT] }
        externalWarehouseId: { type: string }
        salesChannels: { type: array, items: { type: string } }
        version: { type: integer, format: int64 }
    CreateWarehouseRequest:
      type: object
      required: [warehouseCode, name, warehouseType, regionCode, sourceSystem]
      properties:
        warehouseCode: { type: string, maxLength: 80 }
        name: { type: string, maxLength: 255 }
        warehouseType: { type: string }
        regionCode: { type: string }
        sourceSystem: { type: string, enum: [WMS, ONE_C, MANUAL_IMPORT] }
        externalWarehouseId: { type: string }
        salesChannels: { type: array, items: { type: string } }
    UpdateWarehouseRequest:
      allOf:
        - $ref: '#/components/schemas/CreateWarehouseRequest'
        - type: object
          required: [status, reasonCode, version]
          properties:
            status: { $ref: '#/components/schemas/WarehouseStatus' }
            reasonCode: { type: string }
            version: { type: integer, format: int64 }
    StockPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/StockResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    StockResponse:
      type: object
      required: [stockItemId, warehouseId, sku, sellableQty, reservedQty, blockedQty, availabilityStatus]
      properties:
        stockItemId: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        productId: { type: string }
        sku: { type: string }
        catalogPeriodCode: { type: string }
        channelCode: { type: string }
        physicalQty: { type: number }
        sellableQty: { type: number }
        reservedQty: { type: number }
        blockedQty: { type: number }
        inboundQty: { type: number }
        backorderQty: { type: number }
        availabilityStatus: { $ref: '#/components/schemas/AvailabilityStatus' }
        lastSyncAt: { type: string, format: date-time }
    ChangeAvailabilityRuleRequest:
      type: object
      required: [policy, reasonCode]
      properties:
        policy: { $ref: '#/components/schemas/AvailabilityStatus' }
        reasonCode: { type: string }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time }
    SupplyPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SupplyResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    CreateSupplyRequest:
      type: object
      required: [supplyCode, warehouseId, sourceSystem, externalDocumentId, lines]
      properties:
        supplyCode: { type: string }
        warehouseId: { type: string, format: uuid }
        sourceSystem: { type: string, enum: [WMS, ONE_C, MANUAL_IMPORT] }
        externalDocumentId: { type: string }
        expectedAt: { type: string, format: date-time }
        lines: { type: array, items: { $ref: '#/components/schemas/SupplyLineRequest' } }
    SupplyLineRequest:
      type: object
      required: [sku, plannedQty]
      properties:
        sku: { type: string }
        plannedQty: { type: number }
        externalLineId: { type: string }
    AcceptSupplyRequest:
      type: object
      required: [lines]
      properties:
        lines: { type: array, items: { $ref: '#/components/schemas/AcceptedSupplyLineRequest' } }
    AcceptedSupplyLineRequest:
      allOf:
        - $ref: '#/components/schemas/SupplyLineRequest'
        - type: object
          properties:
            acceptedQty: { type: number }
            damagedQty: { type: number }
            shortageQty: { type: number }
            surplusQty: { type: number }
            reasonCode: { type: string }
    SupplyResponse:
      type: object
      required: [supplyId, supplyCode, warehouseId, status, lines]
      properties:
        supplyId: { type: string, format: uuid }
        supplyCode: { type: string }
        warehouseId: { type: string, format: uuid }
        status: { type: string, enum: [PLANNED, CONFIRMED, IN_TRANSIT, ARRIVED, ACCEPTANCE_IN_PROGRESS, ACCEPTED, PARTIALLY_ACCEPTED, CANCELLED] }
        externalDocumentId: { type: string }
        lines: { type: array, items: { $ref: '#/components/schemas/AcceptedSupplyLineRequest' } }
    CreateReservationRequest:
      type: object
      required: [orderId, warehouseId, sku, quantity]
      properties:
        orderId: { type: string }
        warehouseId: { type: string, format: uuid }
        sku: { type: string }
        quantity: { type: number, minimum: 0 }
    ReservationResponse:
      type: object
      required: [reservationId, orderId, warehouseId, sku, quantity, status]
      properties:
        reservationId: { type: string, format: uuid }
        orderId: { type: string }
        warehouseId: { type: string, format: uuid }
        sku: { type: string }
        quantity: { type: number }
        status: { type: string, enum: [HELD, CONFIRMED, RELEASED, EXPIRED] }
    StartSyncRunRequest:
      type: object
      required: [sourceSystem]
      properties:
        sourceSystem: { type: string, enum: [WMS, ONE_C, MANUAL_IMPORT] }
        warehouseId: { type: string, format: uuid }
        skuFilter: { type: string }
        documentType: { type: string }
    SyncRunResponse:
      type: object
      required: [syncRunId, sourceSystem, status, correlationId]
      properties:
        syncRunId: { type: string, format: uuid }
        sourceSystem: { type: string }
        status: { type: string, enum: [STARTED, COMPLETED, FAILED] }
        processedCount: { type: integer }
        duplicateCount: { type: integer }
        errorCount: { type: integer }
        quarantinedCount: { type: integer }
        correlationId: { type: string }
    SyncMessagePage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SyncMessageResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    SyncMessageResponse:
      type: object
      required: [syncMessageId, sourceSystem, externalDocumentId, messageStatus, payloadChecksum]
      properties:
        syncMessageId: { type: string, format: uuid }
        sourceSystem: { type: string }
        externalDocumentId: { type: string }
        externalLineId: { type: string }
        idempotencyKey: { type: string }
        messageStatus: { type: string, enum: [PROCESSED, DUPLICATE_IGNORED, FAILED, QUARANTINED] }
        payloadChecksum: { type: string }
        reasonCode: { type: string }
        affectedSku: { type: string }
        retryCount: { type: integer }
    ResolveDiscrepancyRequest:
      type: object
      required: [resolutionStatus, reasonCode, comment]
      properties:
        resolutionStatus: { type: string, enum: [RESOLVED, REJECTED, ESCALATED] }
        reasonCode: { type: string }
        comment: { type: string }
    DiscrepancyResponse:
      type: object
      required: [discrepancyId, warehouseId, sku, status, quantityDelta]
      properties:
        discrepancyId: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        sku: { type: string }
        status: { type: string, enum: [OPEN, IN_REVIEW, RESOLVED, REJECTED, ESCALATED] }
        quantityDelta: { type: number }
        reasonCode: { type: string }
    AuditEventPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditEventResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    AuditEventResponse:
      type: object
      required: [auditEventId, actorUserId, actionCode, entityType, entityId, correlationId, occurredAt]
      properties:
        auditEventId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        actionCode: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        reasonCode: { type: string }
        correlationId: { type: string }
        occurredAt: { type: string, format: date-time }
    WarehouseStatus:
      type: string
      enum: [DRAFT, ACTIVE, TEMPORARILY_BLOCKED, MAINTENANCE, ARCHIVED]
    AvailabilityStatus:
      type: string
      enum: [SELLABLE, RESERVED_ONLY, BACKORDER_ALLOWED, NOT_SELLABLE, QUALITY_HOLD]
    ErrorResponse:
      type: object
      required: [code, correlationId]
      properties:
        code:
          type: string
          example: STR_MNEMO_ADMIN_WMS_STOCK_NOT_ENOUGH
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
              field: { type: string }
              code: { type: string }
        correlationId: { type: string }
