openapi: 3.1.0
info:
  title: Best Ori Gin Admin Identity Module API
  version: 2026.04
  description: Полная OpenAPI спецификация module_admin-identity после feature #35.
servers:
  - url: /api/admin/identity
paths:
  /subjects:
    get:
      summary: Search users, partners, employees and organizations
      operationId: searchAdminIdentitySubjects
      parameters:
        - { name: query, in: query, schema: { type: string } }
        - { name: subjectType, in: query, schema: { type: string, enum: [USER, PARTNER, EMPLOYEE, ORGANIZATION] } }
        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, PENDING_VERIFICATION, SUSPENDED, BLOCKED, ARCHIVED] } }
        - { name: sponsorCode, in: query, schema: { type: string } }
        - { name: officeId, in: query, schema: { type: string } }
        - { name: employeeRole, in: query, schema: { type: string } }
      responses:
        '200':
          description: Masked subject search result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubjectSearchResponse' }
        '403': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /subjects/{subjectId}:
    get:
      summary: Get full admin subject card
      operationId: getAdminIdentitySubjectCard
      parameters:
        - { name: subjectId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Subject card with masked PII and audit preview.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubjectCard' }
        '403': { $ref: '#/components/responses/MnemonicErrorResponse' }
        '404': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /subjects/{subjectId}/status:
    post:
      summary: Change subject status with reasonCode
      operationId: changeAdminIdentitySubjectStatus
      parameters:
        - { name: subjectId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeStatusRequest' }
      responses:
        '200':
          description: Status changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusChangeResult' }
        '409': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /partners/{partnerSubjectId}/sponsor-relationships:
    post:
      summary: Change partner sponsor relationship
      operationId: changePartnerSponsorRelationship
      parameters:
        - { name: partnerSubjectId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SponsorRelationshipChangeRequest' }
      responses:
        '200':
          description: Sponsor relationship version changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SponsorRelationshipResult' }
        '409': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /employees/{employeeSubjectId}/bindings:
    put:
      summary: Replace employee bindings and scopes
      operationId: updateEmployeeBindings
      parameters:
        - { name: employeeSubjectId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeBindingsUpdateRequest' }
      responses:
        '200':
          description: Bindings saved after conflict validation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmployeeBindingsResult' }
        '409': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /impersonation/policies:
    get:
      summary: List impersonation policies
      operationId: listImpersonationPolicies
      responses:
        '200':
          description: Policies.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ImpersonationPolicy' }
    post:
      summary: Save impersonation policy
      operationId: saveImpersonationPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImpersonationPolicySaveRequest' }
      responses:
        '200':
          description: Policy saved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImpersonationPolicy' }
        '409': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /impersonation/sessions:
    post:
      summary: Start controlled impersonation session
      operationId: startImpersonationSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartImpersonationRequest' }
      responses:
        '201':
          description: Session started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImpersonationSession' }
        '409': { $ref: '#/components/responses/MnemonicErrorResponse' }
  /audit-events:
    get:
      summary: Search immutable admin identity audit events
      operationId: searchAdminIdentityAuditEvents
      parameters:
        - { name: subjectId, in: query, schema: { type: string, format: uuid } }
        - { name: actorSubjectId, in: query, schema: { type: string, format: uuid } }
        - { name: actionCode, in: query, schema: { type: string } }
        - { name: reasonCode, in: query, schema: { type: string } }
      responses:
        '200':
          description: Audit events.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEventSearchResponse' }
components:
  responses:
    MnemonicErrorResponse:
      description: Mnemonic error without hardcoded user-facing text.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MnemonicError' }
  schemas:
    MnemonicError:
      type: object
      required: [code, correlationId]
      properties:
        code: { type: string, pattern: '^STR_MNEMO_ADMIN_IDENTITY_[A-Z0-9_]+$' }
        correlationId: { type: string }
        parameters: { type: object, additionalProperties: true }
    SubjectSearchResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SubjectSearchItem' } }
        total: { type: integer }
    SubjectSearchItem:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        subjectType: { type: string }
        displayName: { type: string }
        status: { type: string }
        maskedContact: { type: string }
        sponsorCode: { type: string }
        employeeRole: { type: string }
    SubjectCard:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        subjectType: { type: string }
        displayName: { type: string }
        status: { type: string }
        profileAttributes: { type: array, items: { type: object, additionalProperties: true } }
        partnerSummary: { type: object, additionalProperties: true }
        employeeBindings: { type: array, items: { type: object, additionalProperties: true } }
        eligibilityRules: { type: array, items: { type: object, additionalProperties: true } }
        auditPreview: { type: array, items: { $ref: '#/components/schemas/AuditEvent' } }
    ChangeStatusRequest:
      type: object
      required: [newStatus, reasonCode]
      properties:
        newStatus: { type: string }
        reasonCode: { type: string }
        comment: { type: string }
    StatusChangeResult:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        oldStatus: { type: string }
        newStatus: { type: string }
        auditEventId: { type: string, format: uuid }
    SponsorRelationshipChangeRequest:
      type: object
      required: [newSponsorSubjectId, effectiveFrom, reasonCode]
      properties:
        newSponsorSubjectId: { type: string, format: uuid }
        effectiveFrom: { type: string, format: date-time }
        reasonCode: { type: string }
    SponsorRelationshipResult:
      type: object
      properties:
        relationshipId: { type: string, format: uuid }
        impactPreview: { type: object, additionalProperties: true }
    EmployeeBindingsUpdateRequest:
      type: object
      required: [bindings, reasonCode]
      properties:
        bindings: { type: array, items: { type: object, additionalProperties: true } }
        reasonCode: { type: string }
    EmployeeBindingsResult:
      type: object
      properties:
        employeeSubjectId: { type: string, format: uuid }
        conflictState: { type: string }
    ImpersonationPolicySaveRequest:
      type: object
      required: [policyCode, actorRoleCode, targetSubjectType, maxDurationMinutes, reasonCode]
      properties:
        policyCode: { type: string }
        actorRoleCode: { type: string }
        targetSubjectType: { type: string }
        allowedActions: { type: array, items: { type: string } }
        forbiddenActions: { type: array, items: { type: string } }
        maxDurationMinutes: { type: integer }
        approvalRequired: { type: boolean }
        reasonCode: { type: string }
    ImpersonationPolicy:
      allOf:
        - $ref: '#/components/schemas/ImpersonationPolicySaveRequest'
        - type: object
          properties:
            policyId: { type: string, format: uuid }
            status: { type: string }
    StartImpersonationRequest:
      type: object
      required: [targetSubjectId, reasonCode]
      properties:
        targetSubjectId: { type: string, format: uuid }
        reasonCode: { type: string }
        requestedDurationMinutes: { type: integer }
    ImpersonationSession:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        actorSubjectId: { type: string, format: uuid }
        targetSubjectId: { type: string, format: uuid }
        reasonCode: { type: string }
        status: { type: string }
        expiresAt: { type: string, format: date-time }
    AuditEvent:
      type: object
      properties:
        auditEventId: { type: string, format: uuid }
        subjectId: { type: string, format: uuid }
        actorSubjectId: { type: string, format: uuid }
        actionCode: { type: string }
        reasonCode: { type: string }
        correlationId: { type: string }
        occurredAt: { type: string, format: date-time }
    AuditEventSearchResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditEvent' } }
        total: { type: integer }
