openapi: 3.1.0
info:
  title: Best Ori Gin Admin Orders API
  version: 0.1.0-feature-033
  description: >
    Feature 033 API for administration of orders, carts, supplementary orders,
    payment events, refunds, financial holds, anti-fraud decisions, operator
    actions and audit trail. Runtime Swagger is generated by springdoc-openapi
    under /v3/api-docs/admin-order and Swagger UI /swagger-ui/admin-order.
servers:
  - url: /api/admin/orders
security:
  - bearerAuth: []
tags:
  - name: Orders
  - name: SupplementaryOrders
  - name: Payments
  - name: Refunds
  - name: FinancialHolds
  - name: Risk
  - name: OperatorActions
  - name: Audit
paths:
  /orders:
    get:
      tags: [Orders]
      summary: Search administrative orders
      operationId: searchAdminOrders
      security:
        - bearerAuth: [ADMIN_ORDER_VIEW]
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/OrderStatus'
        - $ref: '#/components/parameters/PaymentStatus'
        - $ref: '#/components/parameters/FulfillmentStatus'
        - $ref: '#/components/parameters/WarehouseIdQuery'
        - $ref: '#/components/parameters/CatalogPeriodCode'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Administrative order page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderPage'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get administrative order card
      operationId: getAdminOrder
      security:
        - bearerAuth: [ADMIN_ORDER_VIEW]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Administrative order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetails'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{orderId}/status-transition:
    post:
      tags: [Orders]
      summary: Change order status by allowed transition
      operationId: transitionAdminOrderStatus
      security:
        - bearerAuth: [ADMIN_ORDER_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusTransitionRequest'
      responses:
        '200':
          description: Updated order card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetails'
        '409':
          $ref: '#/components/responses/Conflict'
  /orders/{orderId}/supplementary-orders:
    post:
      tags: [SupplementaryOrders]
      summary: Create supplementary order linked to parent order
      operationId: createSupplementaryOrder
      security:
        - bearerAuth: [ADMIN_ORDER_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplementaryOrderRequest'
      responses:
        '201':
          description: Created supplementary order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetails'
        '409':
          $ref: '#/components/responses/Conflict'
  /orders/{orderId}/operator-actions:
    post:
      tags: [OperatorActions]
      summary: Execute safe operator action on an order
      operationId: executeOperatorAction
      security:
        - bearerAuth: [ADMIN_ORDER_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperatorActionRequest'
      responses:
        '200':
          description: Updated order card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetails'
        '409':
          $ref: '#/components/responses/Conflict'
  /payment-events:
    post:
      tags: [Payments]
      summary: Ingest idempotent payment provider event
      operationId: ingestPaymentEvent
      security:
        - bearerAuth: [ADMIN_ORDER_PAYMENT_MANAGE]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentEventRequest'
      responses:
        '202':
          description: Accepted payment event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentEventResponse'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Payments]
      summary: Search payment events
      operationId: searchPaymentEvents
      security:
        - bearerAuth: [ADMIN_ORDER_VIEW]
      parameters:
        - name: orderId
          in: query
          schema: { type: string, format: uuid }
        - name: externalPaymentId
          in: query
          schema: { type: string }
        - name: operationType
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Payment event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentEventPage'
  /orders/{orderId}/refunds:
    post:
      tags: [Refunds]
      summary: Create full or partial refund
      operationId: createRefund
      security:
        - bearerAuth: [ADMIN_ORDER_REFUND_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '202':
          description: Refund requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /orders/{orderId}/financial-holds:
    post:
      tags: [FinancialHolds]
      summary: Create financial hold for order
      operationId: createFinancialHold
      security:
        - bearerAuth: [ADMIN_ORDER_PAYMENT_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancialHoldRequest'
      responses:
        '201':
          description: Created financial hold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialHoldResponse'
  /financial-holds/{financialHoldId}/release:
    post:
      tags: [FinancialHolds]
      summary: Release active financial hold
      operationId: releaseFinancialHold
      security:
        - bearerAuth: [ADMIN_ORDER_PAYMENT_MANAGE]
      parameters:
        - name: financialHoldId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseFinancialHoldRequest'
      responses:
        '200':
          description: Released financial hold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialHoldResponse'
  /orders/{orderId}/risk-decisions:
    post:
      tags: [Risk]
      summary: Make anti-fraud decision for order risk event
      operationId: decideRiskEvent
      security:
        - bearerAuth: [ADMIN_ORDER_RISK_MANAGE]
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskDecisionRequest'
      responses:
        '200':
          description: Updated risk event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskEventResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /audit-events:
    get:
      tags: [Audit]
      summary: Search order audit events
      operationId: searchOrderAuditEvents
      security:
        - bearerAuth: [ADMIN_ORDER_AUDIT_VIEW]
      parameters:
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: string }
        - name: actorUserId
          in: query
          schema: { type: string, format: uuid }
        - name: correlationId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Audit event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPage'
  /audit-events/export:
    post:
      tags: [Audit]
      summary: Export filtered order audit events
      operationId: exportOrderAuditEvents
      security:
        - bearerAuth: [ADMIN_ORDER_EXPORT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditExportRequest'
      responses:
        '202':
          description: Accepted export job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WarehouseIdQuery:
      name: warehouseId
      in: query
      schema: { type: string, format: uuid }
    CatalogPeriodCode:
      name: catalogPeriodCode
      in: query
      schema: { type: string }
    Search:
      name: search
      in: query
      schema: { type: string }
    OrderStatus:
      name: orderStatus
      in: query
      schema: { $ref: '#/components/schemas/OrderStatus' }
    PaymentStatus:
      name: paymentStatus
      in: query
      schema: { $ref: '#/components/schemas/PaymentStatus' }
    FulfillmentStatus:
      name: fulfillmentStatus
      in: query
      schema: { $ref: '#/components/schemas/FulfillmentStatus' }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 120 }
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Business conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    AdminOrderPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AdminOrderSummary' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    AdminOrderSummary:
      type: object
      required: [orderId, orderNumber, orderStatus, paymentStatus, fulfillmentStatus, totalAmount, currencyCode]
      properties:
        orderId: { type: string, format: uuid }
        orderNumber: { type: string }
        parentOrderId: { type: string, format: uuid }
        customerId: { type: string }
        partnerId: { type: string }
        catalogPeriodCode: { type: string }
        sourceChannel: { type: string }
        orderStatus: { $ref: '#/components/schemas/OrderStatus' }
        paymentStatus: { $ref: '#/components/schemas/PaymentStatus' }
        fulfillmentStatus: { $ref: '#/components/schemas/FulfillmentStatus' }
        warehouseId: { type: string, format: uuid }
        totalAmount: { type: number }
        paidAmount: { type: number }
        refundedAmount: { type: number }
        currencyCode: { type: string }
        financialHoldActive: { type: boolean }
    AdminOrderDetails:
      allOf:
        - $ref: '#/components/schemas/AdminOrderSummary'
        - type: object
          required: [lines, fulfillmentGroups, paymentEvents, refunds, riskEvents, auditEvents]
          properties:
            cartId: { type: string }
            bonusWriteoffAmount: { type: number }
            discountAmount: { type: number }
            lines: { type: array, items: { $ref: '#/components/schemas/AdminOrderLine' } }
            fulfillmentGroups: { type: array, items: { $ref: '#/components/schemas/FulfillmentGroupResponse' } }
            paymentEvents: { type: array, items: { $ref: '#/components/schemas/PaymentEventResponse' } }
            refunds: { type: array, items: { $ref: '#/components/schemas/RefundResponse' } }
            financialHolds: { type: array, items: { $ref: '#/components/schemas/FinancialHoldResponse' } }
            riskEvents: { type: array, items: { $ref: '#/components/schemas/RiskEventResponse' } }
            supplementaryOrders: { type: array, items: { $ref: '#/components/schemas/AdminOrderSummary' } }
            auditEvents: { type: array, items: { $ref: '#/components/schemas/AuditEventResponse' } }
            allowedActions: { type: array, items: { type: string } }
    AdminOrderLine:
      type: object
      required: [orderLineId, sku, quantity, unitPrice, lineTotal, lineStatus]
      properties:
        orderLineId: { type: string, format: uuid }
        sku: { type: string }
        productId: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        discountAmount: { type: number }
        bonusAmount: { type: number }
        lineTotal: { type: number }
        fulfillmentGroupId: { type: string, format: uuid }
        lineStatus: { type: string }
    FulfillmentGroupResponse:
      type: object
      required: [fulfillmentGroupId, reserveStatus, fulfillmentStatus]
      properties:
        fulfillmentGroupId: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        reserveStatus: { type: string, enum: [HELD, CONFIRMED, RELEASED, EXPIRED] }
        shipmentReference: { type: string }
        fulfillmentStatus: { $ref: '#/components/schemas/FulfillmentStatus' }
        blockedReasonCode: { type: string }
        partialAvailable: { type: boolean }
    CreateSupplementaryOrderRequest:
      type: object
      required: [reasonCode, lines]
      properties:
        reasonCode: { type: string }
        comment: { type: string, maxLength: 1000 }
        lines: { type: array, minItems: 1, items: { $ref: '#/components/schemas/SupplementaryOrderLineRequest' } }
    SupplementaryOrderLineRequest:
      type: object
      required: [sku, quantity]
      properties:
        sku: { type: string }
        quantity: { type: number, minimum: 0 }
    StatusTransitionRequest:
      type: object
      required: [targetStatus, reasonCode, version]
      properties:
        targetStatus: { $ref: '#/components/schemas/OrderStatus' }
        reasonCode: { type: string }
        comment: { type: string, maxLength: 1000 }
        version: { type: integer, format: int64 }
    OperatorActionRequest:
      type: object
      required: [actionCode, reasonCode]
      properties:
        actionCode: { type: string, enum: [UPDATE_DELIVERY_COMMENT, UPDATE_CONTACT_ROUTE, UPDATE_ADDRESS_BEFORE_SHIPMENT, SPLIT_ORDER, MERGE_ORDER] }
        reasonCode: { type: string }
        payload: { type: object, additionalProperties: true }
    PaymentEventRequest:
      type: object
      required: [orderId, providerCode, externalPaymentId, operationType, amount, currencyCode]
      properties:
        orderId: { type: string, format: uuid }
        providerCode: { type: string }
        externalPaymentId: { type: string }
        operationType: { type: string, enum: [AUTHORIZATION, CAPTURE, CANCEL, REFUND, PARTIAL_REFUND, DISPUTE, CHARGEBACK] }
        amount: { type: number }
        currencyCode: { type: string, minLength: 3, maxLength: 3 }
        payloadChecksum: { type: string }
        occurredAt: { type: string, format: date-time }
    PaymentEventPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PaymentEventResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    PaymentEventResponse:
      type: object
      required: [paymentEventId, orderId, providerCode, externalPaymentId, operationType, paymentStatus, amount, currencyCode, correlationId]
      properties:
        paymentEventId: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        providerCode: { type: string }
        externalPaymentId: { type: string }
        operationType: { type: string }
        paymentStatus: { $ref: '#/components/schemas/PaymentStatus' }
        amount: { type: number }
        currencyCode: { type: string }
        duplicate: { type: boolean }
        correlationId: { type: string }
        occurredAt: { type: string, format: date-time }
    CreateRefundRequest:
      type: object
      required: [refundType, amount, currencyCode, reasonCode]
      properties:
        refundType: { type: string, enum: [FULL, PARTIAL] }
        amount: { type: number, minimum: 0 }
        currencyCode: { type: string }
        reasonCode: { type: string }
        comment: { type: string }
        orderLineIds: { type: array, items: { type: string, format: uuid } }
    RefundResponse:
      type: object
      required: [refundId, orderId, refundType, refundStatus, amount, currencyCode, reasonCode, correlationId]
      properties:
        refundId: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        refundType: { type: string, enum: [FULL, PARTIAL] }
        refundStatus: { type: string, enum: [REQUESTED, SENT_TO_PROVIDER, SUCCEEDED, FAILED, CANCELLED] }
        amount: { type: number }
        currencyCode: { type: string }
        reasonCode: { type: string }
        externalRefundId: { type: string }
        correlationId: { type: string }
    CreateFinancialHoldRequest:
      type: object
      required: [reasonCode]
      properties:
        paymentEventId: { type: string, format: uuid }
        reasonCode: { type: string }
        comment: { type: string }
        expiresAt: { type: string, format: date-time }
    ReleaseFinancialHoldRequest:
      type: object
      required: [reasonCode]
      properties:
        reasonCode: { type: string }
        comment: { type: string }
    FinancialHoldResponse:
      type: object
      required: [financialHoldId, orderId, holdStatus, reasonCode]
      properties:
        financialHoldId: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        paymentEventId: { type: string, format: uuid }
        holdStatus: { type: string, enum: [ACTIVE, RELEASED, EXPIRED] }
        reasonCode: { type: string }
        expiresAt: { type: string, format: date-time }
    RiskDecisionRequest:
      type: object
      required: [riskEventId, decisionStatus, reasonCode]
      properties:
        riskEventId: { type: string, format: uuid }
        decisionStatus: { type: string, enum: [APPROVED, REJECTED, NEEDS_MORE_INFO, EXPIRED] }
        reasonCode: { type: string }
        comment: { type: string }
    RiskEventResponse:
      type: object
      required: [riskEventId, orderId, riskScore, decisionStatus, correlationId]
      properties:
        riskEventId: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        riskScore: { type: number }
        ruleCodes: { type: array, items: { type: string } }
        decisionStatus: { type: string, enum: [NEEDS_REVIEW, APPROVED, REJECTED, NEEDS_MORE_INFO, EXPIRED] }
        decisionReasonCode: { type: string }
        correlationId: { type: string }
    AuditEventPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditEventResponse' } }
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }
    AuditEventResponse:
      type: object
      required: [auditEventId, actorUserId, actionCode, entityType, entityId, correlationId, occurredAt]
      properties:
        auditEventId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        actionCode: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        reasonCode: { type: string }
        correlationId: { type: string }
        occurredAt: { type: string, format: date-time }
    AuditExportRequest:
      type: object
      required: [filters, format]
      properties:
        filters: { type: object, additionalProperties: true }
        format: { type: string, enum: [CSV, XLSX] }
    AuditExportResponse:
      type: object
      required: [exportJobId, status]
      properties:
        exportJobId: { type: string, format: uuid }
        status: { type: string, enum: [ACCEPTED, COMPLETED, FAILED] }
    OrderStatus:
      type: string
      enum: [DRAFT, PLACED, PAYMENT_PENDING, PAID, RESERVED, ASSEMBLY, SHIPPED, DELIVERED, CANCELLED, PARTIALLY_CANCELLED]
    PaymentStatus:
      type: string
      enum: [NOT_REQUIRED, PENDING, AUTHORIZED, PAID, PARTIALLY_REFUNDED, REFUNDED, FAILED, DISPUTED, CHARGEBACK]
    FulfillmentStatus:
      type: string
      enum: [NOT_STARTED, RESERVED, ASSEMBLY, PARTIAL, SHIPPED, DELIVERED, BLOCKED, CANCELLED]
    ErrorResponse:
      type: object
      required: [code, correlationId]
      properties:
        code:
          type: string
          example: STR_MNEMO_ADMIN_ORDER_FINANCIAL_INVARIANT_FAILED
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
              field: { type: string }
              code: { type: string }
        correlationId: { type: string }
