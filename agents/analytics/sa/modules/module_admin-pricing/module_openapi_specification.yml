openapi: 3.1.0
info:
  title: Best Ori Gin Admin Pricing API
  version: 0.1.0-module-baseline-feature-031
  description: >
    Feature 031 API for administration of price lists, prices, promo prices,
    segment rules, promotions, shopping offers, gifts, threshold benefits,
    import/export jobs and audit events. Runtime Swagger is generated by
    springdoc-openapi under /v3/api-docs/admin-pricing.
servers:
  - url: /api/admin/pricing
security:
  - bearerAuth: []
tags:
  - name: PriceLists
  - name: Prices
  - name: Promotions
  - name: Imports
  - name: Audit
paths:
  /price-lists:
    get:
      tags: [PriceLists]
      summary: Search price lists
      operationId: searchPriceLists
      security:
        - bearerAuth: [ADMIN_PRICING_VIEW]
      parameters:
        - $ref: '#/components/parameters/CampaignId'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Price list page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListPage'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [PriceLists]
      summary: Create price list
      operationId: createPriceList
      security:
        - bearerAuth: [ADMIN_PRICING_MANAGE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePriceListRequest'
      responses:
        '201':
          description: Created price list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /price-lists/{priceListId}:
    get:
      tags: [PriceLists]
      summary: Get price list details
      operationId: getPriceList
      security:
        - bearerAuth: [ADMIN_PRICING_VIEW]
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      responses:
        '200':
          description: Price list details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [PriceLists]
      summary: Update price list metadata
      operationId: updatePriceList
      security:
        - bearerAuth: [ADMIN_PRICING_MANAGE]
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceListRequest'
      responses:
        '200':
          description: Updated price list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /price-lists/{priceListId}/prices:
    post:
      tags: [Prices]
      summary: Add base price
      operationId: addBasePrice
      security:
        - bearerAuth: [ADMIN_PRICING_MANAGE]
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBasePriceRequest'
      responses:
        '201':
          description: Created base price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasePriceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /price-lists/{priceListId}/promo-prices:
    post:
      tags: [Prices]
      summary: Add promo price
      operationId: addPromoPrice
      security:
        - bearerAuth: [ADMIN_PRICING_MANAGE]
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPromoPriceRequest'
      responses:
        '201':
          description: Created promo price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoPriceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /segment-rules:
    post:
      tags: [Prices]
      summary: Create segment rule
      operationId: createSegmentRule
      security:
        - bearerAuth: [ADMIN_PRICING_MANAGE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSegmentRuleRequest'
      responses:
        '201':
          description: Created segment rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentRuleResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /promotions:
    get:
      tags: [Promotions]
      summary: Search promotions
      operationId: searchPromotions
      security:
        - bearerAuth: [ADMIN_PRICING_VIEW]
      parameters:
        - $ref: '#/components/parameters/CampaignId'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Promotion page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionPage'
    post:
      tags: [Promotions]
      summary: Create promotion
      operationId: createPromotion
      security:
        - bearerAuth: [ADMIN_PROMOTION_MANAGE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromotionRequest'
      responses:
        '201':
          description: Created promotion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /promotions/{promotionId}/offers:
    post:
      tags: [Promotions]
      summary: Create shopping offer
      operationId: createShoppingOffer
      security:
        - bearerAuth: [ADMIN_PROMOTION_MANAGE]
      parameters:
        - $ref: '#/components/parameters/PromotionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShoppingOfferRequest'
      responses:
        '201':
          description: Created shopping offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingOfferResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /promotions/{promotionId}/gift-rules:
    post:
      tags: [Promotions]
      summary: Create gift rule
      operationId: createGiftRule
      security:
        - bearerAuth: [ADMIN_PROMOTION_MANAGE]
      parameters:
        - $ref: '#/components/parameters/PromotionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGiftRuleRequest'
      responses:
        '201':
          description: Created gift rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GiftRuleResponse'
  /publish:
    post:
      tags: [PriceLists, Promotions]
      summary: Publish price list and promotions after preflight validation
      operationId: publishPricing
      security:
        - bearerAuth: [ADMIN_PRICING_PUBLISH]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishPricingRequest'
      responses:
        '200':
          description: Publish result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishPricingResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /offers/{offerId}/pause:
    post:
      tags: [Promotions]
      summary: Emergency pause shopping offer
      operationId: pauseShoppingOffer
      security:
        - bearerAuth: [ADMIN_PRICING_PUBLISH]
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PauseOfferRequest'
      responses:
        '200':
          description: Paused offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingOfferResponse'
  /imports:
    post:
      tags: [Imports]
      summary: Create pricing import job
      operationId: createPricingImportJob
      security:
        - bearerAuth: [ADMIN_PRICING_IMPORT_EXPORT]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportJobRequest'
      responses:
        '202':
          description: Accepted import job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'
  /audit-events:
    get:
      tags: [Audit]
      summary: Search pricing audit events
      operationId: searchPricingAuditEvents
      security:
        - bearerAuth: [ADMIN_PRICING_AUDIT_VIEW]
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
        - name: correlationId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Audit event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPage'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PriceListId:
      name: priceListId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PromotionId:
      name: promotionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CampaignId:
      name: campaignId
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
    Search:
      name: search
      in: query
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 120
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Business conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    PriceListPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PriceListResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
    PriceListResponse:
      type: object
      required: [priceListId, priceListCode, campaignId, currencyCode, status, activeFrom, activeTo, version]
      properties:
        priceListId:
          type: string
          format: uuid
        priceListCode:
          type: string
        name:
          type: string
        campaignId:
          type: string
        countryCode:
          type: string
        currencyCode:
          type: string
        channelCode:
          type: string
        status:
          $ref: '#/components/schemas/AdminPricingStatus'
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    CreatePriceListRequest:
      type: object
      required: [priceListCode, name, campaignId, countryCode, currencyCode, channelCode, activeFrom, activeTo]
      properties:
        priceListCode:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 255
        campaignId:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3
        channelCode:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    UpdatePriceListRequest:
      allOf:
        - $ref: '#/components/schemas/CreatePriceListRequest'
        - type: object
          required: [version]
          properties:
            version:
              type: integer
              format: int64
    AddBasePriceRequest:
      type: object
      required: [productId, sku, basePrice, taxMode, activeFrom, activeTo]
      properties:
        productId:
          type: string
        sku:
          type: string
        basePrice:
          type: number
          format: decimal
          minimum: 0
        taxMode:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    BasePriceResponse:
      allOf:
        - $ref: '#/components/schemas/AddBasePriceRequest'
        - type: object
          required: [priceId, status]
          properties:
            priceId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
    AddPromoPriceRequest:
      type: object
      required: [sku, promoPrice, discountType, activeFrom, activeTo]
      properties:
        sku:
          type: string
        promoPrice:
          type: number
          format: decimal
        discountType:
          type: string
          enum: [FIXED_PRICE, PERCENT, AMOUNT]
        discountValue:
          type: number
          format: decimal
        segmentCode:
          type: string
        reasonCode:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    PromoPriceResponse:
      allOf:
        - $ref: '#/components/schemas/AddPromoPriceRequest'
        - type: object
          required: [promoPriceId, status]
          properties:
            promoPriceId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
    CreateSegmentRuleRequest:
      type: object
      required: [campaignId, segmentCode, roleCode, priority, activeFrom, activeTo]
      properties:
        campaignId:
          type: string
        segmentCode:
          type: string
        roleCode:
          type: string
        partnerLevel:
          type: string
        customerType:
          type: string
        regionCode:
          type: string
        priority:
          type: integer
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    SegmentRuleResponse:
      allOf:
        - $ref: '#/components/schemas/CreateSegmentRuleRequest'
        - type: object
          required: [ruleId, status]
          properties:
            ruleId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
    PromotionPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromotionResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
    CreatePromotionRequest:
      type: object
      required: [promotionCode, nameKey, campaignId, audience, channelCode, activeFrom, activeTo]
      properties:
        promotionCode:
          type: string
        nameKey:
          type: string
        campaignId:
          type: string
        audience:
          type: string
        channelCode:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    PromotionResponse:
      allOf:
        - $ref: '#/components/schemas/CreatePromotionRequest'
        - type: object
          required: [promotionId, status, version]
          properties:
            promotionId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
            version:
              type: integer
              format: int64
    CreateShoppingOfferRequest:
      type: object
      required: [offerCode, offerType, titleKey, priority, stackable]
      properties:
        offerCode:
          type: string
        offerType:
          type: string
          enum: [CROSS_SELL, UPSELL, BUNDLE, GIFT, WELCOME_BENEFIT, RETENTION_BENEFIT, THRESHOLD_BENEFIT]
        titleKey:
          type: string
        descriptionKey:
          type: string
        priority:
          type: integer
        stackable:
          type: boolean
        mutuallyExclusiveGroup:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OfferItemRequest'
    OfferItemRequest:
      type: object
      required: [sku, quantity, itemRole, sortOrder]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        itemRole:
          type: string
          enum: [REQUIRED, OPTIONAL, RECOMMENDED]
        sortOrder:
          type: integer
    ShoppingOfferResponse:
      allOf:
        - $ref: '#/components/schemas/CreateShoppingOfferRequest'
        - type: object
          required: [offerId, status]
          properties:
            offerId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
    CreateGiftRuleRequest:
      type: object
      required: [giftSku, triggerType, maxGiftQuantity, activeFrom, activeTo]
      properties:
        giftSku:
          type: string
        triggerType:
          type: string
          enum: [CART_AMOUNT, SKU_PRESENT, CATEGORY_AMOUNT, SEGMENT]
        thresholdAmount:
          type: number
          format: decimal
        triggerSku:
          type: string
        maxGiftQuantity:
          type: integer
          minimum: 1
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
    GiftRuleResponse:
      allOf:
        - $ref: '#/components/schemas/CreateGiftRuleRequest'
        - type: object
          required: [giftRuleId, status]
          properties:
            giftRuleId:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/AdminPricingStatus'
    PublishPricingRequest:
      type: object
      required: [priceListId, promotionIds]
      properties:
        priceListId:
          type: string
          format: uuid
        promotionIds:
          type: array
          items:
            type: string
            format: uuid
        comment:
          type: string
    PublishPricingResponse:
      type: object
      required: [status, appliedPriceListId, appliedPromotionIds, warnings, correlationId]
      properties:
        status:
          type: string
          enum: [PUBLISHED, VALIDATION_FAILED]
        appliedPriceListId:
          type: string
          format: uuid
        appliedPromotionIds:
          type: array
          items:
            type: string
            format: uuid
        warnings:
          type: array
          items:
            type: string
        correlationId:
          type: string
    PauseOfferRequest:
      type: object
      required: [reasonCode]
      properties:
        reasonCode:
          type: string
        comment:
          type: string
    CreateImportJobRequest:
      type: object
      required: [sourceFileName, dryRun, checksum]
      properties:
        sourceFileName:
          type: string
        dryRun:
          type: boolean
        checksum:
          type: string
        importType:
          type: string
          enum: [PRICE_LIST, PROMOTION, FULL_PRICING]
    ImportJobResponse:
      type: object
      required: [jobId, idempotencyKey, dryRun, status, rowCount, errorCount]
      properties:
        jobId:
          type: string
          format: uuid
        idempotencyKey:
          type: string
        dryRun:
          type: boolean
        status:
          type: string
          enum: [UPLOADED, VALIDATED, APPLIED, FAILED]
        rowCount:
          type: integer
        errorCount:
          type: integer
    AuditEventPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEventResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
    AuditEventResponse:
      type: object
      required: [auditEventId, actorUserId, actionCode, entityType, entityId, correlationId, occurredAt]
      properties:
        auditEventId:
          type: string
          format: uuid
        actorUserId:
          type: string
          format: uuid
        actionCode:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        reasonCode:
          type: string
        correlationId:
          type: string
        occurredAt:
          type: string
          format: date-time
    AdminPricingStatus:
      type: string
      enum: [DRAFT, READY_FOR_REVIEW, SCHEDULED, ACTIVE, PAUSED, ARCHIVED]
    ErrorResponse:
      type: object
      required: [code, correlationId]
      properties:
        code:
          type: string
          example: STR_MNEMO_ADMIN_PRICING_PRICE_PERIOD_OVERLAP
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
              field:
                type: string
              code:
                type: string
        correlationId:
          type: string
