openapi: 3.1.0
info:
  title: Best Ori Gin catalog module API
  version: 1.2.0
  description: Full catalog module API through feature 006: search, product card, cart add, current/next digital catalogues and PDF material actions.
paths:
  /api/catalog/search:
    get:
      summary: Получить поисковую выдачу каталога
      parameters:
        - $ref: '#/components/parameters/Audience'
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: availability
          in: query
          schema:
            type: string
            enum: [all, inStock, outOfStock]
            default: all
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, newest, priceAsc, priceDesc, popular]
            default: relevance
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 12
      responses:
        "200":
          description: Search result or empty state with recommendations
  /api/catalog/products/{productCode}:
    get:
      summary: Получить детальную карточку товара
      parameters:
        - name: productCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - $ref: '#/components/parameters/Audience'
        - name: campaignCode
          in: query
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: Product card
        "404":
          description: Product not found or not published
  /api/catalog/cart/items:
    post:
      summary: Добавить товар из выдачи или карточки в корзину
      requestBody:
        required: true
      responses:
        "200":
          description: Cart summary after successful add
        "400":
          description: Invalid quantity or unavailable item
        "401":
          description: Authentication required
        "409":
          description: Product unavailable for cart add
  /api/catalog/digital-catalogues/current:
    get:
      summary: Получить текущий цифровой каталог
      parameters:
        - $ref: '#/components/parameters/Audience'
      responses:
        "200":
          description: Current digital catalogue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalCatalogueIssueResponse'
        "404":
          description: Current digital catalogue not found
  /api/catalog/digital-catalogues/next:
    get:
      summary: Получить следующий цифровой каталог
      parameters:
        - $ref: '#/components/parameters/Audience'
      responses:
        "200":
          description: Next digital catalogue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalCatalogueIssueResponse'
        "403":
          description: Next digital catalogue is not visible for the role
        "404":
          description: Next digital catalogue not found
  /api/catalog/digital-catalogues/{issueCode}:
    get:
      summary: Получить цифровой каталог по коду выпуска
      parameters:
        - name: issueCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - $ref: '#/components/parameters/Audience'
      responses:
        "200":
          description: Digital catalogue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalCatalogueIssueResponse'
        "403":
          description: Issue is not visible for the role
        "404":
          description: Issue not found
  /api/catalog/digital-catalogues/materials/{materialId}/download:
    post:
      summary: Создать временную ссылку скачивания PDF-материала
      parameters:
        - name: materialId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalCatalogueMaterialActionResponse'
        "403":
          description: Download forbidden
        "404":
          description: Material unavailable
  /api/catalog/digital-catalogues/materials/{materialId}/share:
    post:
      summary: Создать временную share-ссылку PDF-материала
      parameters:
        - name: materialId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
      responses:
        "200":
          description: Share URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalCatalogueMaterialActionResponse'
        "403":
          description: Share forbidden
        "404":
          description: Material unavailable
components:
  parameters:
    Audience:
      name: audience
      in: query
      schema:
        type: string
        enum: [GUEST, CUSTOMER, PARTNER, CONTENT_MANAGER, CATALOG_MANAGER]
        default: GUEST
  schemas:
    CatalogProductCardResponse:
      type: object
      properties:
        productCode:
          type: string
        name:
          type: string
        price:
          type: object
        availability:
          type: object
        orderLimits:
          type: object
        media:
          type: array
        information:
          type: object
        attachments:
          type: array
        recommendations:
          type: array
    DigitalCatalogueIssueResponse:
      type: object
      required: [issueCode, title, period, publicationStatus, pages, materials]
      properties:
        issueCode:
          type: string
        title:
          type: string
        periodType:
          type: string
          enum: [CURRENT, NEXT, ARCHIVE]
        period:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
        publicationStatus:
          type: string
          enum: [DRAFT, SCHEDULED, PUBLISHED, ARCHIVED]
        viewer:
          type: object
        pages:
          type: array
          items:
            $ref: '#/components/schemas/DigitalCataloguePage'
        materials:
          type: array
          items:
            $ref: '#/components/schemas/DigitalCatalogueMaterial'
    DigitalCataloguePage:
      type: object
      properties:
        pageNumber:
          type: integer
        imageUrl:
          type: string
        thumbnailUrl:
          type: string
        hotspots:
          type: array
          items:
            type: object
            properties:
              productCode:
                type: string
              xPercent:
                type: number
              yPercent:
                type: number
              widthPercent:
                type: number
              heightPercent:
                type: number
    DigitalCatalogueMaterial:
      type: object
      properties:
        materialId:
          type: string
        materialType:
          type: string
          enum: [MAIN_CATALOG, BROCHURE, PROMO_LEAFLET, DOCUMENT]
        title:
          type: string
        previewUrl:
          type: string
        actions:
          type: object
    DigitalCatalogueMaterialActionResponse:
      type: object
      properties:
        url:
          type: string
        expiresAt:
          type: string
          format: date-time
        messageCode:
          type: string
          examples: [STR_MNEMO_DIGITAL_CATALOGUE_MATERIAL_READY]
