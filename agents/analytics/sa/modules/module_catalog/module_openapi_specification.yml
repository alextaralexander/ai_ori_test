openapi: 3.1.0
info:
  title: Best Ori Gin catalog module API
  version: 1.1.0
paths:
  /api/catalog/search:
    get:
      summary: Получить поисковую выдачу каталога
      parameters:
        - name: audience
          in: query
          schema:
            type: string
            enum: [GUEST, CUSTOMER, PARTNER]
            default: GUEST
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: availability
          in: query
          schema:
            type: string
            enum: [all, inStock, outOfStock]
            default: all
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, newest, priceAsc, priceDesc, popular]
            default: relevance
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 12
      responses:
        "200":
          description: Search result or empty state with recommendations
  /api/catalog/products/{productCode}:
    get:
      summary: Получить детальную карточку товара
      parameters:
        - name: productCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: audience
          in: query
          schema:
            type: string
            enum: [GUEST, CUSTOMER, PARTNER]
            default: GUEST
        - name: campaignCode
          in: query
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: Product card
        "404":
          description: Product not found or not published
  /api/catalog/cart/items:
    post:
      summary: Добавить товар из выдачи или карточки в корзину
      requestBody:
        required: true
      responses:
        "200":
          description: Cart summary after successful add
        "400":
          description: Invalid quantity or unavailable item
        "401":
          description: Authentication required
        "409":
          description: Product unavailable for cart add
components:
  schemas:
    CatalogProductCardResponse:
      type: object
      properties:
        productCode:
          type: string
        name:
          type: string
        price:
          type: object
        availability:
          type: object
        orderLimits:
          type: object
        media:
          type: array
        information:
          type: object
        attachments:
          type: array
        recommendations:
          type: array
