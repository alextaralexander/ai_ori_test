openapi: 3.1.0
info:
  title: Best Ori Gin Employee API
  version: 0.21.0
  description: API employee-контура для workspace, операторского заказа, поддержки проблемного заказа, истории заказов сотрудника и employee-претензий.
servers:
  - url: /api/employee
paths:
  /workspace:
    get:
      summary: Поиск клиента, партнера или заказа в employee workspace
      parameters:
        - { in: query, name: query, required: true, schema: { type: string } }
      responses:
        '200': { description: Найденный support-контекст }
        '400': { description: STR_MNEMO_EMPLOYEE_QUERY_INVALID }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
  /operator-orders:
    post:
      summary: Создать операторский заказ от имени клиента или партнера
      responses:
        '200': { description: Результат созданного заказа }
        '400': { description: Ошибка валидации }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
  /operator-orders/{operatorOrderId}/confirm:
    post:
      summary: Подтвердить операторский заказ
      parameters:
        - { in: path, name: operatorOrderId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Подтвержденный заказ }
  /order-support/{orderNumber}:
    get:
      summary: Открыть поддержку проблемного заказа
      parameters:
        - { in: path, name: orderNumber, required: true, schema: { type: string } }
      responses:
        '200': { description: Support-карточка заказа }
        '404': { description: STR_MNEMO_EMPLOYEE_ORDER_NOT_FOUND }
  /order-support/{orderNumber}/notes:
    post:
      summary: Добавить внутреннюю заметку сотрудника
      responses:
        '200': { description: Заметка сохранена }
  /order-support/{orderNumber}/adjustments:
    post:
      summary: Зафиксировать сервисную корректировку
      responses:
        '200': { description: Корректировка сохранена }
  /order-support/{orderNumber}/escalations:
    post:
      summary: Создать эскалацию поддержки
      responses:
        '200': { description: Эскалация создана }
  /supervisor/escalations:
    get:
      summary: Получить список эскалаций для супервизора
      responses:
        '200': { description: Список эскалаций }
  /order-history:
    get:
      summary: Получить операторскую историю заказов
      parameters:
        - { in: query, name: partnerId, schema: { type: string } }
        - { in: query, name: customerId, schema: { type: string } }
        - { in: query, name: dateFrom, schema: { type: string, format: date } }
        - { in: query, name: dateTo, schema: { type: string, format: date } }
        - { in: query, name: orderStatus, schema: { type: string } }
        - { in: query, name: paymentStatus, schema: { type: string, enum: [PENDING, READY_TO_PAY, PAID, FAILED] } }
        - { in: query, name: deliveryStatus, schema: { type: string, enum: [DRAFT, CONFIRMED, IN_TRANSIT, DELAYED] } }
        - { in: query, name: problemOnly, schema: { type: boolean, default: false } }
        - { in: query, name: query, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 0 } }
        - { in: query, name: size, schema: { type: integer, default: 20, maximum: 100 } }
        - { in: query, name: sort, schema: { type: string } }
      responses:
        '200': { description: Страница заказов employee read-model }
        '400': { description: STR_MNEMO_EMPLOYEE_ORDER_HISTORY_FILTER_INVALID }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
  /order-history/{orderId}:
    get:
      summary: Получить расширенные детали заказа для сотрудника
      parameters:
        - { in: path, name: orderId, required: true, schema: { type: string } }
      responses:
        '200': { description: Расширенная карточка заказа }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
        '404': { description: STR_MNEMO_EMPLOYEE_ORDER_NOT_FOUND }
  /submit-claim:
    post:
      summary: Создать претензию сотрудником от имени клиента или партнера
      parameters:
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeClaimCreateRequest' }
      responses:
        '201': { description: Создана employee-претензия }
        '200': { description: Возвращена претензия для того же idempotency key }
        '400': { description: STR_MNEMO_EMPLOYEE_CLAIM_VALIDATION_FAILED }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
  /claims:
    get:
      summary: Получить историю employee claims
      parameters:
        - { in: query, name: claimStatus, schema: { type: string } }
        - { in: query, name: dateFrom, schema: { type: string, format: date } }
        - { in: query, name: dateTo, schema: { type: string, format: date } }
        - { in: query, name: slaState, schema: { type: string } }
        - { in: query, name: responsibleRole, schema: { type: string } }
        - { in: query, name: assigneeId, schema: { type: string } }
        - { in: query, name: resolutionType, schema: { type: string } }
        - { in: query, name: sourceChannel, schema: { type: string } }
        - { in: query, name: warehouseCode, schema: { type: string } }
        - { in: query, name: financeStatus, schema: { type: string } }
        - { in: query, name: query, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 0 } }
        - { in: query, name: size, schema: { type: integer, default: 20, maximum: 100 } }
        - { in: query, name: sort, schema: { type: string } }
      responses:
        '200': { description: Страница employee claims }
        '400': { description: STR_MNEMO_EMPLOYEE_CLAIM_FILTER_INVALID }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
  /claims/{claimId}:
    get:
      summary: Получить детальную карточку employee claim
      parameters:
        - { in: path, name: claimId, required: true, schema: { type: string } }
        - { in: query, name: supportReasonCode, required: true, schema: { type: string } }
      responses:
        '200': { description: Детальная карточка employee claim }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
        '404': { description: STR_MNEMO_EMPLOYEE_CLAIM_NOT_FOUND }
  /claims/{claimId}/transitions:
    post:
      summary: Выполнить transition employee claim
      parameters:
        - { in: path, name: claimId, required: true, schema: { type: string } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeClaimTransitionRequest' }
      responses:
        '200': { description: Обновленная карточка employee claim }
        '400': { description: STR_MNEMO_EMPLOYEE_CLAIM_TRANSITION_INVALID }
        '403': { description: STR_MNEMO_EMPLOYEE_ACCESS_DENIED }
        '404': { description: STR_MNEMO_EMPLOYEE_CLAIM_NOT_FOUND }
components:
  schemas:
    EmployeeOperatorOrderCreateRequest:
      type: object
      required: [targetCustomerId, supportReasonCode, cartType]
      properties:
        targetCustomerId: { type: string }
        supportReasonCode: { type: string }
        cartType: { type: string, enum: [MAIN, SUPPLEMENTARY] }
    EmployeeOrderHistoryPageResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/EmployeeOrderHistorySummaryResponse' } }
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        auditRecorded: { type: boolean }
    EmployeeOrderHistorySummaryResponse:
      type: object
      properties:
        orderId: { type: string }
        orderNumber: { type: string }
        customerDisplayName: { type: string }
        partnerDisplayName: { type: string }
        maskedPhone: { type: string }
        maskedEmail: { type: string }
        orderStatus: { type: string }
        paymentStatus: { type: string }
        deliveryStatus: { type: string }
        fulfillmentStatus: { type: string }
        totalAmount: { type: number }
        currencyCode: { type: string }
        problemFlags: { type: array, items: { type: string } }
        linkedRoutes: { type: object, additionalProperties: { type: string } }
    EmployeeOrderHistoryDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/EmployeeOrderHistorySummaryResponse'
        - type: object
          properties:
            items: { type: array, items: { type: object } }
            paymentEvents: { type: array, items: { type: object } }
            deliveryEvents: { type: array, items: { type: object } }
            wmsEvents: { type: array, items: { type: object } }
            supportCaseIds: { type: array, items: { type: string } }
            claimIds: { type: array, items: { type: string } }
            auditEvents: { type: array, items: { type: object } }
    EmployeeClaimCreateRequest:
      type: object
      required: [supportReasonCode, orderNumber, items, requestedResolution]
      properties:
        customerId: { type: string }
        partnerId: { type: string }
        orderId: { type: string }
        orderNumber: { type: string }
        sourceChannel: { type: string }
        supportReasonCode: { type: string }
        requestedResolution: { type: string }
        comment: { type: string }
        attachments: { type: array, items: { type: object } }
        items: { type: array, items: { $ref: '#/components/schemas/EmployeeClaimItemRequest' } }
    EmployeeClaimItemRequest:
      type: object
      required: [sku, productCode, quantity, problemType, requestedResolution]
      properties:
        sku: { type: string }
        productCode: { type: string }
        quantity: { type: integer, minimum: 1 }
        problemType: { type: string }
        requestedResolution: { type: string }
        internalComment: { type: string }
    EmployeeClaimTransitionRequest:
      type: object
      required: [transitionCode, supportReasonCode]
      properties:
        transitionCode: { type: string }
        supportReasonCode: { type: string }
        assigneeId: { type: string }
        resultCode: { type: string }
        comment: { type: string }
        approvedCompensationAmount: { type: number }
    EmployeeClaimPageResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/EmployeeClaimSummaryResponse' } }
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        auditRecorded: { type: boolean }
    EmployeeClaimSummaryResponse:
      type: object
      properties:
        claimId: { type: string }
        claimNumber: { type: string }
        orderNumber: { type: string }
        customerOrPartnerLabel: { type: string }
        maskedContact: { type: string }
        status: { type: string }
        slaState: { type: string }
        slaDueAt: { type: string, format: date-time }
        resolutionType: { type: string }
        compensationAmount: { type: number }
        currencyCode: { type: string }
        assignee: { type: string }
        responsibleRole: { type: string }
        updatedAt: { type: string, format: date-time }
        availableActions: { type: array, items: { type: string } }
    EmployeeClaimDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/EmployeeClaimSummaryResponse'
        - type: object
          properties:
            customerId: { type: string }
            partnerId: { type: string }
            requestedResolution: { type: string }
            approvedResolution: { type: string }
            publicReasonMnemonic: { type: string }
            supervisorRequired: { type: boolean }
            items: { type: array, items: { type: object } }
            attachments: { type: array, items: { type: object } }
            routeTasks: { type: array, items: { type: object } }
            auditEvents: { type: array, items: { type: object } }
