openapi: 3.1.0
info:
  title: Best Ori Gin Partner Office Module API
  version: 1.0.0
  description: Полная OpenAPI спецификация module partner-office после feature 018.
servers:
  - url: /api/partner-office
paths:
  /orders:
    get:
      summary: Список заказов партнерского офиса
      operationId: searchPartnerOfficeOrders
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - { name: officeId, in: query, schema: { type: string } }
        - { name: regionId, in: query, schema: { type: string } }
        - { name: campaignId, in: query, schema: { type: string } }
        - { name: supplyId, in: query, schema: { type: string } }
        - { name: query, in: query, schema: { type: string } }
        - { name: hasDeviation, in: query, schema: { type: boolean } }
      responses:
        '200':
          description: Страница заказов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/AccessDenied' }
  /supply:
    get:
      summary: Список supply-поставок
      operationId: searchPartnerOfficeSupply
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - { name: officeId, in: query, schema: { type: string } }
        - { name: regionId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: hasDeviation, in: query, schema: { type: boolean } }
      responses:
        '200':
          description: Страница supply
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplyPage' }
  /supply/{supplyId}:
    get:
      summary: Детали supply-поставки
      operationId: getPartnerOfficeSupply
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - { name: supplyId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Детали supply
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplyDetails' }
        '404': { $ref: '#/components/responses/NotFound' }
  /supply/{supplyId}/transition:
    post:
      summary: Transition supply status
      operationId: transitionPartnerOfficeSupply
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - { name: supplyId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionRequest' }
      responses:
        '200':
          description: Transition result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
  /supply/orders/{orderNumber}:
    get:
      summary: Детали заказа в поставке
      operationId: getPartnerOfficeSupplyOrder
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Заказ в supply context
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplyOrderDetails' }
  /supply/orders/{orderNumber}/deviations:
    post:
      summary: Создать отклонение приемки
      operationId: createPartnerOfficeDeviation
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviationRequest' }
      responses:
        '200':
          description: Deviation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResponse' }
  /report:
    get:
      summary: Отчет партнерского офиса
      operationId: getPartnerOfficeReport
      parameters:
        - $ref: '#/components/parameters/UserContextId'
        - { name: officeId, in: query, schema: { type: string } }
        - { name: regionId, in: query, schema: { type: string } }
      responses:
        '200':
          description: KPI отчета
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
components:
  parameters:
    UserContextId:
      name: X-User-Context-Id
      in: header
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    AccessDenied:
      description: STR_MNEMO_PARTNER_OFFICE_ACCESS_DENIED
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: STR_MNEMO_PARTNER_OFFICE_SUPPLY_NOT_FOUND
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ValidationError:
      description: Validation mnemonic
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  schemas:
    OrderPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/OrderSummary' } }
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer }
    OrderSummary:
      type: object
      properties:
        orderNumber: { type: string }
        officeId: { type: string }
        regionId: { type: string }
        campaignId: { type: string }
        supplyId: { type: string }
        orderStatus: { type: string }
        paymentStatus: { type: string }
        assemblyStatus: { type: string }
        deliveryStatus: { type: string }
        hasDeviation: { type: boolean }
        grandTotalAmount: { type: string }
        currency: { type: string }
    SupplyPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SupplySummary' } }
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer }
    SupplySummary:
      type: object
      properties:
        supplyId: { type: string }
        officeId: { type: string }
        regionId: { type: string }
        warehouseId: { type: string }
        externalWmsDocumentId: { type: string }
        status: { type: string }
        orderCount: { type: integer }
        boxCount: { type: integer }
        skuCount: { type: integer }
        deviationCount: { type: integer }
    SupplyDetails:
      allOf:
        - $ref: '#/components/schemas/SupplySummary'
        - type: object
          properties:
            orders: { type: array, items: { $ref: '#/components/schemas/OrderSummary' } }
            items: { type: array, items: { $ref: '#/components/schemas/SupplyItem' } }
            movements: { type: array, items: { $ref: '#/components/schemas/Movement' } }
            deviations: { type: array, items: { $ref: '#/components/schemas/Deviation' } }
            availableActions: { type: array, items: { type: string } }
    SupplyOrderDetails:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/SupplyItem' } }
            movements: { type: array, items: { $ref: '#/components/schemas/Movement' } }
            deviations: { type: array, items: { $ref: '#/components/schemas/Deviation' } }
            workflowLinks: { type: object, additionalProperties: { type: string } }
    SupplyItem:
      type: object
      properties:
        sku: { type: string }
        productName: { type: string }
        expectedQuantity: { type: integer }
        acceptedQuantity: { type: integer }
        boxNumber: { type: string }
    Movement:
      type: object
      properties:
        movementType: { type: string }
        sourceSystem: { type: string }
        externalReference: { type: string }
        occurredAt: { type: string, format: date-time }
        actorId: { type: string }
    Deviation:
      type: object
      properties:
        deviationId: { type: string }
        deviationType: { type: string }
        sku: { type: string }
        quantity: { type: integer }
        reasonCode: { type: string }
        claimId: { type: string }
    TransitionRequest:
      type: object
      required: [targetStatus]
      properties:
        targetStatus: { type: string }
        reasonCode: { type: string }
        comment: { type: string }
    DeviationRequest:
      type: object
      required: [supplyId, deviationType, sku, quantity, reasonCode]
      properties:
        supplyId: { type: string }
        deviationType: { type: string }
        sku: { type: string }
        quantity: { type: integer, minimum: 1 }
        reasonCode: { type: string }
        comment: { type: string }
    ActionResponse:
      type: object
      properties:
        messageCode: { type: string, pattern: '^STR_MNEMO_[A-Z0-9_]+$' }
        correlationId: { type: string }
    Report:
      type: object
      properties:
        officeId: { type: string }
        regionId: { type: string }
        supplyCount: { type: integer }
        orderCount: { type: integer }
        shortageCount: { type: integer }
        damagedCount: { type: integer }
        shipmentSlaPercent: { type: string }
        acceptanceSlaPercent: { type: string }
    Error:
      type: object
      properties:
        code: { type: string, pattern: '^STR_MNEMO_[A-Z0-9_]+$' }
        details: { type: array, items: { type: string } }
