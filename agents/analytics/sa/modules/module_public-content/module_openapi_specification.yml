openapi: 3.1.0
info:
  title: Best Ori Gin public-content module API
  version: 1.0.0
paths:
  /api/public-content/pages/home:
    get:
      summary: Получить публичную главную
      responses:
        "200":
          description: Главная страница
  /api/public-content/navigation:
    get:
      summary: Получить публичную навигацию
      responses:
        "200":
          description: Header и footer навигация
  /api/public-content/news:
    get:
      summary: Получить ленту новостей
      responses:
        "200":
          description: Лента новостей
  /api/public-content/content/{contentId}:
    get:
      summary: Получить контентную страницу
      responses:
        "200":
          description: Контентная страница
        "404":
          description: Материал не найден
  /api/public-content/offers/{offerId}:
    get:
      summary: Получить промо-оффер
      responses:
        "200":
          description: Оффер
        "404":
          description: Оффер не найден
  /api/public-content/faq:
    get:
      summary: Получить FAQ
      responses:
        "200":
          description: FAQ
  /api/public-content/info/{section}:
    get:
      summary: Получить информационный раздел
      responses:
        "200":
          description: Информационный раздел
        "404":
          description: Раздел не найден
  /api/public-content/documents/{documentType}:
    get:
      summary: Получить документы
      responses:
        "200":
          description: Документы выбранного типа
        "404":
          description: Тип документов не найден
