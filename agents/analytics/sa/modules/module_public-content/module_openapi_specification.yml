openapi: 3.1.0
info:
  title: Best Ori Gin public-content module API
  version: 1.0.0
paths:
  /api/public-content/pages/home:
    get:
      summary: Получить публичную главную
      responses:
        "200":
          description: Главная страница
  /api/public-content/navigation:
    get:
      summary: Получить публичную навигацию
      responses:
        "200":
          description: Header и footer навигация
  /api/public-content/news:
    get:
      summary: Получить ленту новостей
      responses:
        "200":
          description: Лента новостей
  /api/public-content/content/{contentId}:
    get:
      summary: Получить контентную страницу
      responses:
        "200":
          description: Контентная страница
        "404":
          description: Материал не найден
  /api/public-content/offers/{offerId}:
    get:
      summary: Получить промо-оффер
      responses:
        "200":
          description: Оффер
        "404":
          description: Оффер не найден
  /api/public-content/faq:
    get:
      summary: Получить FAQ
      responses:
        "200":
          description: FAQ
  /api/public-content/info/{section}:
    get:
      summary: Получить информационный раздел
      responses:
        "200":
          description: Информационный раздел
        "404":
          description: Раздел не найден
  /api/public-content/documents/{documentType}:
    get:
      summary: Получить документы
      responses:
        "200":
          description: Документы выбранного типа
        "404":
          description: Тип документов не найден
  /api/public-content/benefit-landings/{landingType}:
    get:
      summary: Получить benefit-лендинг
      parameters:
        - name: landingType
          in: path
          required: true
          schema:
            type: string
            enum: [BEAUTY, BUSINESS, MEMBER, VIP_CUSTOMER, APP]
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
        - name: variant
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Benefit landing payload с SEO, referral context, blocks и CTA
        "404":
          description: Лендинг не опубликован
  /api/public-content/benefit-landings/conversions:
    post:
      summary: Зарегистрировать conversion event benefit-лендинга
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [landingType, variant, ctaType, routePath, occurredAt]
              properties:
                landingType:
                  type: string
                  enum: [BEAUTY, BUSINESS, MEMBER, VIP_CUSTOMER, APP]
                variant:
                  type: string
                referralCode:
                  type: string
                campaignId:
                  type: string
                ctaType:
                  type: string
                routePath:
                  type: string
                occurredAt:
                  type: string
                  format: date-time
                anonymousSessionId:
                  type: string
      responses:
        "202":
          description: Conversion event принят
        "400":
          description: Некорректный payload conversion event
